<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقريظ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-primary: #00695c;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e1e2e4;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #404947;
            --md-outline-variant: #bfc9c6;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
        }
        body.dark-mode {
            --md-primary: #4db6ac;
            --md-background: #121212;
            --md-surface: #1e1e1e;
            --md-surface-variant: #2c2c2c;
            --md-on-surface: #e0e0e0;
            --md-on-surface-variant: #a0a0a0;
            --md-outline-variant: #3a3a3a;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.4), 0px 1px 2px 0px rgba(0,0,0,0.5);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--md-background);
            color: var(--md-on-surface);
            margin: 0;
            padding: 16px 12px 32px;
            -webkit-font-smoothing: antialiased;
        }
        .review-card {
            background: var(--md-surface);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: var(--md-elevation-1);
            border: 1px solid var(--md-outline-variant);
        }
        .review-name {
            font-size: 1rem;
            font-weight: 800;
            color: var(--md-primary);
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .review-message {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--md-on-surface-variant);
            white-space: pre-line;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--md-on-surface-variant);
        }
        .empty-state .material-icons-round {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.4;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="container">
    <div class="empty-state">
        <span class="material-icons-round" style="animation:spin 1s linear infinite">sync</span>
    </div>
</div>
<script>
    // Sync dark mode with parent app
    if (localStorage.getItem('darkMode') === '1') {
        document.body.classList.add('dark-mode');
    }

    // Listen for dark mode changes from parent
    window.addEventListener('storage', e => {
        if (e.key === 'darkMode') {
            document.body.classList.toggle('dark-mode', e.newValue === '1');
        }
    });

    fetch('reviews.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(text => {
            const data = JSON.parse(text.replace(/^\uFEFF/, '').trim());
            const reviews = Array.isArray(data) ? data : (data ? [data] : []);
            const container = document.getElementById('container');
            if (!reviews.length) {
                container.innerHTML = '<div class="empty-state"><span class="material-icons-round">format_quote</span><p>لا توجد تقاريظ بعد.</p></div>';
                return;
            }
            container.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="review-name">
                        <span class="material-icons-round">person</span>
                        ${r.name || ''}
                    </div>
                    <div class="review-message">${r.message || ''}</div>
                </div>`).join('');
        })
        .catch(() => {
            document.getElementById('container').innerHTML =
                '<div class="empty-state"><span class="material-icons-round">error_outline</span><p>تعذّر تحميل التقاريظ.</p></div>';
        });
</script>
</body>
</html>
