<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اقتراح أفضل طبعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        html { direction: ltr; } /* scrollbar on right */
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --md-primary: #00695c;
            --md-on-primary: #ffffff;
            --md-primary-container: #b2dfdb;
            --md-on-primary-container: #00201a;
            --md-secondary: #006b5f;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e8edec;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #3f4947;
            --md-outline: #6f7977;
            --md-outline-variant: #bec9c6;
            --md-error: #ba1a1a;
            --md-error-container: #ffdad6;
            --md-success: #1b5e20;
            --md-success-container: #c8e6c9;
            --md-elevation-1: 0 1px 3px 1px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --md-elevation-2: 0 2px 6px 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: var(--md-background);
            color: var(--md-on-surface);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* RTL on layout containers, not body (prevents direction propagating to viewport scrollbar) */
        header, main, footer { direction: rtl; }

        /* ===== HEADER ===== */
        header {
            background: var(--md-primary);
            color: var(--md-on-primary);
            padding: 20px 24px;
            text-align: center;
            box-shadow: var(--md-elevation-2);
        }
        header .header-icon {
            font-size: 48px;
            opacity: 0.9;
            display: block;
            margin-bottom: 8px;
        }
        header h1 {
            margin: 0 0 6px 0;
            font-size: 1.4rem;
            font-weight: 800;
        }
        header p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.85;
            line-height: 1.5;
        }

        /* ===== MAIN ===== */
        main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 32px 16px;
        }

        .form-card {
            background: var(--md-surface);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 620px;
            box-shadow: var(--md-elevation-2);
            border: 1px solid var(--md-outline-variant);
        }

        /* ===== PROGRESS ===== */
        .step-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            align-items: center;
            justify-content: center;
        }
        .step-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--md-outline-variant);
            transition: background 0.3s, transform 0.3s;
        }
        .step-dot.active {
            background: var(--md-primary);
            transform: scale(1.3);
        }
        .step-dot.done {
            background: var(--md-primary-container);
        }

        /* ===== FORM GROUPS ===== */
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--md-on-surface-variant);
        }
        .form-group label .material-icons-round {
            font-size: 18px;
            color: var(--md-primary);
        }
        .form-group .hint {
            font-size: 0.8rem;
            color: var(--md-outline);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .form-group .hint .material-icons-round {
            font-size: 14px;
        }

        .md-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--md-outline-variant);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--md-background);
            color: var(--md-on-surface);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .md-input:focus {
            border-color: var(--md-primary);
            box-shadow: 0 0 0 3px rgba(0,105,92,0.12);
            background: var(--md-surface);
        }
        .md-input::placeholder {
            color: var(--md-outline);
        }
        .md-input.valid {
            border-color: #388e3c;
        }
        .md-input.invalid {
            border-color: var(--md-error);
            box-shadow: 0 0 0 3px rgba(186,26,26,0.1);
        }
        textarea.md-input {
            resize: vertical;
            min-height: 90px;
            line-height: 1.6;
        }

        /* ===== AUTOCOMPLETE DROPDOWN ===== */
        .autocomplete-wrapper {
            position: relative;
        }
        .autocomplete-list {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            left: 0;
            background: var(--md-surface);
            border: 1px solid var(--md-outline-variant);
            border-radius: 10px;
            box-shadow: var(--md-elevation-2);
            z-index: 100;
            max-height: 220px;
            overflow-y: auto;
        }
        .autocomplete-list.visible { display: block; }
        .autocomplete-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .autocomplete-item:hover,
        .autocomplete-item.highlighted {
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
        }
        .autocomplete-item mark {
            background: transparent;
            color: var(--md-primary);
            font-weight: 800;
        }
        .no-results {
            padding: 10px 14px;
            font-size: 0.85rem;
            color: var(--md-outline);
            text-align: center;
        }

        /* ===== DIVIDER ===== */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 28px 0 20px;
            color: var(--md-on-surface-variant);
            font-size: 0.85rem;
            font-weight: 700;
        }
        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--md-outline-variant);
        }
        .section-divider .material-icons-round {
            font-size: 16px;
            color: var(--md-primary);
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            width: 100%;
            height: 50px;
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            border-radius: 25px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            box-shadow: var(--md-elevation-1);
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .btn-submit:hover:not(:disabled) {
            background: #00796b;
            box-shadow: var(--md-elevation-2);
        }
        .btn-submit:active:not(:disabled) { transform: scale(0.98); }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-submit .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== FEEDBACK MESSAGES ===== */
        .feedback {
            display: none;
            border-radius: 12px;
            padding: 16px 18px;
            margin-top: 18px;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.5;
            align-items: flex-start;
            gap: 12px;
        }
        .feedback.visible { display: flex; }
        .feedback .material-icons-round { font-size: 24px; flex-shrink: 0; margin-top: 1px; }
        .feedback.success {
            background: var(--md-success-container);
            color: var(--md-success);
            border: 1px solid #a5d6a7;
        }
        .feedback.error {
            background: var(--md-error-container);
            color: var(--md-error);
            border: 1px solid #ffcdd2;
        }

        /* ===== SUCCESS STATE ===== */
        .success-state {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .success-state.visible { display: block; }
        .success-state .big-icon {
            font-size: 72px;
            color: #388e3c;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .success-state h2 {
            color: var(--md-on-surface);
            font-size: 1.3rem;
            margin: 12px 0 8px;
        }
        .success-state p {
            color: var(--md-on-surface-variant);
            font-size: 0.95rem;
            margin: 0 0 20px;
        }
        .btn-another {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 40px;
            padding: 0 20px;
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            border: none;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-another:hover { background: #80cbc4; }

        /* ===== REQUIRED BADGE ===== */
        .required-badge {
            font-size: 0.72rem;
            background: #fff3e0;
            color: #e65100;
            padding: 1px 6px;
            border-radius: 8px;
            border: 1px solid #ffcc80;
            font-weight: 700;
        }
        .optional-badge {
            font-size: 0.72rem;
            background: var(--md-surface-variant);
            color: var(--md-outline);
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* ===== FIELD COUNTER ===== */
        .char-counter {
            font-size: 0.75rem;
            color: var(--md-outline);
            text-align: left;
            margin-top: 4px;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.8rem;
            color: var(--md-outline);
        }
        footer a {
            color: var(--md-primary);
            text-decoration: none;
            font-weight: 700;
        }

        /* ===== BOOK EXISTS CARD ===== */
        .book-exists-card {
            display: none;
            background: #fff8e1;
            border: 1.5px solid #ffa000;
            border-radius: 12px;
            padding: 16px;
            margin-top: 10px;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .book-exists-card.visible { display: block; }
        .exists-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 0.95rem;
            color: #e65100;
            margin-bottom: 12px;
        }
        .exists-header .material-icons-round { font-size: 22px; }
        .exists-source-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: auto;
        }
        .badge-db    { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
        .badge-sheet { background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }
        .exists-editions { display: flex; flex-direction: column; gap: 8px; }
        .exists-edition-row {
            background: var(--md-surface);
            border: 1px solid var(--md-outline-variant);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.9rem;
        }
        .exists-edition-row strong { color: var(--md-primary); display: block; margin-bottom: 2px; }
        .exists-edition-row span { color: var(--md-on-surface-variant); font-size: 0.82rem; display: block; }
        .exists-footer {
            margin-top: 12px;
            font-size: 0.82rem;
            color: #bf360c;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .exists-footer .material-icons-round { font-size: 16px; }
        .md-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--md-surface-variant);
        }

        /* ===== EDITION ROWS ===== */
        .edition-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            background: var(--md-background);
            border: 1px solid var(--md-outline-variant);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .edition-row-inputs { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .btn-remove-edition {
            background: var(--md-error-container);
            color: var(--md-error);
            border: none;
            width: 32px; height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 3px;
            transition: background 0.2s;
        }
        .btn-remove-edition:hover { background: #ffcdd2; }
        .btn-remove-edition:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-add-edition-row {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            padding: 0 14px;
            background: #e0f2f1;
            color: var(--md-primary);
            border: 1px dashed var(--md-primary);
            border-radius: 16px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s;
        }
        .btn-add-edition-row:hover { background: var(--md-primary-container); }
        .btn-add-edition-row:disabled { opacity: 0.4; cursor: not-allowed; }
        .edition-row-number {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--md-primary);
            background: var(--md-primary-container);
            border-radius: 10px;
            padding: 1px 7px;
            margin-bottom: 4px;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .form-card { padding: 20px 16px; border-radius: 16px; }
            header { padding: 16px; }
            header h1 { font-size: 1.2rem; }
        }

        /* ===== DARK MODE ===== */
        body.dark-mode {
            --md-primary: #4db6ac;
            --md-on-primary: #00201a;
            --md-primary-container: #004d40;
            --md-on-primary-container: #b2dfdb;
            --md-background: #121212;
            --md-surface: #1e1e1e;
            --md-surface-variant: #2c2c2c;
            --md-on-surface: #e0e0e0;
            --md-on-surface-variant: #a0a0a0;
            --md-outline: #686868;
            --md-outline-variant: #3a3a3a;
            --md-secondary: #4db6ac;
            --md-error: #cf6679;
            --md-error-container: #3b1219;
            --md-success: #81c784;
            --md-success-container: #1b3d1e;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.4), 0px 1px 2px 0px rgba(0,0,0,0.5);
            --md-elevation-2: 0px 2px 6px 2px rgba(0,0,0,0.4), 0px 1px 2px 0px rgba(0,0,0,0.5);
        }
        body.dark-mode header {
            background: #00352e;
        }
        body.dark-mode .book-exists-card {
            background: #2a2000;
            border-color: #7a5c00;
        }
        body.dark-mode .badge-db  { background: #1b3d1e; color: #81c784; border-color: #2e7d32; }
        body.dark-mode .badge-sheet { background: #0d2a45; color: #90caf9; border-color: #1565c0; }

        /* ===== TYPE SWITCHER ===== */
        .type-switcher {
            display: flex;
            background: var(--md-surface-variant);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 24px;
        }
        .type-btn {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-radius: 9px;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--md-on-surface-variant);
            background: transparent;
            transition: all 0.2s;
        }
        .type-btn .material-icons-round { font-size: 18px; }
        .type-btn.active {
            background: var(--md-surface);
            color: var(--md-primary);
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        body.dark-mode .type-btn.active { box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<main>
    <div class="form-card">

        <!-- FORM STATE -->
        <form id="suggestionForm" novalidate>

            <!-- Type switcher -->
            <div class="type-switcher">
                <button type="button" class="type-btn active" id="type-btn-book" onclick="switchType('book')">
                    <span class="material-icons-round">menu_book</span>
                    اقتراح طبعة كتاب
                </button>
                <button type="button" class="type-btn" id="type-btn-general" onclick="switchType('general')">
                    <span class="material-icons-round">rate_review</span>
                    ملاحظة عامة
                </button>
            </div>

            <!-- ===== BOOK FIELDS ===== -->
            <div id="bookFields">

            <!-- Book field -->
            <div class="form-group">
                <label for="bookInput">
                    <span class="material-icons-round">menu_book</span>
                    اسم الكتاب
                </label>
                <div class="autocomplete-wrapper">
                    <input
                        type="text"
                        id="bookInput"
                        class="md-input"
                        placeholder="ابحث عن الكتاب أو اكتب اسمه..."
                        autocomplete="off"
                        required>
                    <div class="autocomplete-list" id="autocompleteList"></div>
                </div>
                <!-- Book exists card -->
                <div class="book-exists-card" id="bookExistsCard">
                    <div class="exists-header">
                        <span class="material-icons-round">warning_amber</span>
                        <span id="existsTitle">هذا الكتاب مسجّل مسبقاً</span>
                        <span class="exists-source-badge" id="existsBadge"></span>
                    </div>
                    <div class="exists-editions" id="existsEditions"></div>
                    <div class="exists-footer">
                        <span class="material-icons-round">block</span>
                        لا يمكن إضافة اقتراح لكتاب مسجّل مسبقاً — شكراً على متابعتك!
                    </div>
                </div>
            </div>

            <!-- Editions list (dynamic) -->
            <div class="form-group">
                <label>
                    <span class="material-icons-round">verified</span>
                    الطبعات المقترحة
                </label>
                <div id="editionsList"></div>
                <button type="button" class="btn-add-edition-row" id="btnAddEdition" onclick="addEditionRow()">
                    <span class="material-icons-round" style="font-size:14px">add</span> إضافة طبعة أخرى
                </button>
                <div class="hint" style="margin-top:8px;">
                    <span class="material-icons-round">info</span>
                    يمكنك إضافة أكثر من طبعة لنفس الكتاب
                </div>
            </div>

            <!-- Source of preference -->
            <div class="form-group">
                <label for="sourceInput">
                    <span class="material-icons-round">rate_review</span>
                    مصدر التفضيل
                </label>
                <textarea
                    id="sourceInput"
                    class="md-input"
                    placeholder="من أين أخذت هذا التفضيل؟ ..."
                    required></textarea>
                <div class="char-counter" id="charCounter">0 / 500</div>
            </div>

            </div><!-- end #bookFields -->

            <!-- ===== GENERAL FIELDS ===== -->
            <div id="generalFields" style="display:none;">
                <div class="form-group">
                    <label for="subjectInput">
                        <span class="material-icons-round">topic</span>
                        الموضوع
                    </label>
                    <input type="text" id="subjectInput" class="md-input" placeholder="موضوع الملاحظة...">
                </div>
                <div class="form-group">
                    <label for="contentInput">
                        <span class="material-icons-round">description</span>
                        المحتوى
                    </label>
                    <textarea id="contentInput" class="md-input" style="min-height:120px;" placeholder="تفاصيل الملاحظة..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <div class="spinner" id="spinner"></div>
                <span class="material-icons-round" id="submitIcon">send</span>
                <span id="submitLabel">إرسال الاقتراح</span>
            </button>

            <div class="feedback error" id="errorFeedback">
                <span class="material-icons-round">error_outline</span>
                <span id="errorMsg">حدث خطأ أثناء الإرسال. يرجى المحاولة مجدداً.</span>
            </div>
        </form>

        <!-- SUCCESS STATE -->
        <div class="success-state" id="successState">
            <span class="material-icons-round big-icon">check_circle</span>
            <h2>شكراً لمساهمتك!</h2>
            <p>تم إرسال اقتراحك بنجاح وسيُراجَع من قِبل الفريق.</p>
            <button class="btn-another" onclick="resetForm()">
                <span class="material-icons-round">add_circle_outline</span>
                إضافة اقتراح آخر
            </button>
        </div>

    </div>
</main>

<!-- Hidden iframe to receive Apps Script response without CORS issues -->
<iframe id="formResponseFrame" name="formResponseFrame" style="display:none" aria-hidden="true"></iframe>

<script>
    // ============================================================
    // CONFIGURATION
    // Replace with your Google Apps Script Web App URL.
    // See README below for how to create the Apps Script.
    // ============================================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwRr68S3g30zBvb09ZIdbOT3UdtyQKq_TP_C_kQ8teHeiv82DozIlnkzpxESCjEMoVWqA/exec';

    // Spreadsheet ID (used as fallback / reference)
    const SHEET_ID = '198s1pSV_I_wF6DDTHLD2lnWoPBCqrCNAzzh1YugeIfA';

    // ============================================================

    let booksData = [];
    let sheetData = []; // rows already submitted to the Google Sheet

    function normalizeArabic(str) {
        if (!str) return '';
        return String(str)
            .toLowerCase()
            .replace(/[أإآ]/g, 'ا')
            .replace(/ة/g, 'ه')
            .replace(/[\u064B-\u0652]/g, '')
            .trim();
    }

    // Parse CSV text → array of objects keyed by header
    function parseCSV(text) {
        const lines = text.trim().split('\n');
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            // Simple CSV split (no quoted commas in our data)
            const cols = line.split(',');
            const obj = {};
            headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
            return obj;
        });
    }

    // Load books.json + Google Sheet CSV in parallel
    Promise.all([
        fetch('books.json?_t=' + Date.now(), { cache: 'no-store' })
            .then(r => r.ok ? r.json() : []).catch(() => []),
        fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&t=' + Date.now(), { cache: 'no-store' })
            .then(r => r.ok ? r.text() : '').catch(() => '')
    ]).then(([books, csvText]) => {
        booksData = books;
        sheetData = csvText ? parseCSV(csvText) : [];
    });

    // ===== AUTOCOMPLETE =====
    const bookInput      = document.getElementById('bookInput');
    const autocompleteList = document.getElementById('autocompleteList');
    let highlightedIndex = -1;

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function highlightMatch(text, term) {
        if (!term) return escapeHTML(text);
        const norm = normalizeArabic(text);
        const normTerm = normalizeArabic(term);
        const idx = norm.indexOf(normTerm);
        if (idx === -1) return escapeHTML(text);
        return escapeHTML(text.slice(0, idx))
            + '<mark>' + escapeHTML(text.slice(idx, idx + term.length)) + '</mark>'
            + escapeHTML(text.slice(idx + term.length));
    }

    function showSuggestions(term) {
        autocompleteList.innerHTML = '';
        highlightedIndex = -1;
        if (!term || term.length < 1) {
            autocompleteList.classList.remove('visible');
            return;
        }
        const normTerm = normalizeArabic(term);
        const matches = booksData
            .filter(b => b.title && normalizeArabic(b.title).includes(normTerm))
            .slice(0, 8);

        if (matches.length === 0) {
            autocompleteList.innerHTML = '<div class="no-results">لا توجد نتائج — يمكنك كتابة اسم الكتاب يدوياً</div>';
        } else {
            matches.forEach((book, i) => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.innerHTML = highlightMatch(book.title, term)
                    + (book.author ? `<span style="font-size:0.78rem;color:var(--md-outline);margin-right:8px;">${escapeHTML(book.author)}</span>` : '');
                item.addEventListener('mousedown', e => {
                    e.preventDefault();
                    bookInput.value = book.title;
                    bookInput.classList.add('valid');
                    autocompleteList.classList.remove('visible');
                    checkBookExists(book.title);
                });
                autocompleteList.appendChild(item);
            });
        }
        autocompleteList.classList.add('visible');
    }

    bookInput.addEventListener('input', e => {
        showSuggestions(e.target.value.trim());
        validateInput(bookInput);
        hideExistsCard(); // reset while typing
    });

    bookInput.addEventListener('blur', () => {
        // Small delay so autocomplete mousedown fires first
        setTimeout(() => {
            const val = bookInput.value.trim();
            if (val) checkBookExists(val);
        }, 220);
    });

    bookInput.addEventListener('keydown', e => {
        const items = autocompleteList.querySelectorAll('.autocomplete-item');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
            items.forEach((it, i) => it.classList.toggle('highlighted', i === highlightedIndex));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightedIndex = Math.max(highlightedIndex - 1, -1);
            items.forEach((it, i) => it.classList.toggle('highlighted', i === highlightedIndex));
        } else if (e.key === 'Enter' && highlightedIndex >= 0) {
            e.preventDefault();
            items[highlightedIndex].dispatchEvent(new MouseEvent('mousedown'));
        } else if (e.key === 'Escape') {
            autocompleteList.classList.remove('visible');
        }
    });

    document.addEventListener('click', e => {
        if (!bookInput.contains(e.target) && !autocompleteList.contains(e.target)) {
            autocompleteList.classList.remove('visible');
        }
    });

    // ===== DUPLICATE CHECK =====
    function checkBookExists(title) {
        const norm = normalizeArabic(title);
        if (!norm) { hideExistsCard(); return false; }

        // 1. Check books.json
        const dbBook = booksData.find(b => normalizeArabic(b.title) === norm);

        // 2. Check Google Sheet rows (column: الكتاب)
        const sheetRows = sheetData.filter(row => normalizeArabic(row['الكتاب'] || '') === norm);

        if (dbBook) {
            const editions = [...(dbBook.best_editions || []), ...(dbBook.alt_editions || [])];
            const html = editions.length
                ? editions.map(ed =>
                    '<div class="exists-edition-row">' +
                    '<strong>' + escapeHTML(ed.publisher || 'طبعة غير مسمّاة') + '</strong>' +
                    (ed.verifier ? '<span>المحقق: ' + escapeHTML(ed.verifier) + '</span>' : '') +
                    '</div>').join('')
                : '<div class="exists-edition-row"><span>مسجّل في قاعدة البيانات</span></div>';
            showExistsCard('موجود في قاعدة البيانات', 'badge-db', '📚 قاعدة البيانات', html);
            return true;
        }

        if (sheetRows.length > 0) {
            const html = sheetRows.map(row =>
                '<div class="exists-edition-row">' +
                '<strong>' + escapeHTML(row['أفضل طبعة'] || '—') + '</strong>' +
                (row['المحقق'] ? '<span>المحقق: ' + escapeHTML(row['المحقق']) + '</span>' : '') +
                (row['مصدر التفضيل'] ? '<span>المصدر: ' + escapeHTML(row['مصدر التفضيل']) + '</span>' : '') +
                '</div>').join('');
            showExistsCard('مقترح مسبقاً في هذا النموذج', 'badge-sheet', '📋 النموذج', html);
            return true;
        }

        hideExistsCard();
        return false;
    }

    function showExistsCard(titleText, badgeClass, badgeLabel, editionsHTML) {
        document.getElementById('existsTitle').textContent = titleText;
        const badge = document.getElementById('existsBadge');
        badge.className = 'exists-source-badge ' + badgeClass;
        badge.textContent = badgeLabel;
        document.getElementById('existsEditions').innerHTML = editionsHTML;
        document.getElementById('bookExistsCard').classList.add('visible');
        setFormLocked(true);
    }

    function hideExistsCard() {
        document.getElementById('bookExistsCard').classList.remove('visible');
        setFormLocked(false);
    }

    function setFormLocked(locked) {
        document.querySelectorAll('#editionsList .md-input').forEach(el => {
            el.disabled = locked;
            if (locked) { el.value = ''; el.classList.remove('valid', 'invalid'); }
        });
        document.querySelectorAll('#editionsList .btn-remove-edition').forEach(b => b.disabled = locked);
        const addBtn = document.getElementById('btnAddEdition');
        if (addBtn) addBtn.disabled = locked;
        const src = document.getElementById('sourceInput');
        src.disabled = locked;
        if (locked) { src.value = ''; src.classList.remove('valid', 'invalid'); }
        document.getElementById('submitBtn').disabled = locked;
    }

    // ===== VALIDATION =====
    function validateInput(input) {
        const val = input.value.trim();
        if (input.hasAttribute('required') && !val) {
            input.classList.remove('valid');
            input.classList.add('invalid');
            return false;
        }
        input.classList.remove('invalid');
        if (val) input.classList.add('valid');
        return true;
    }

    ['bookInput', 'sourceInput'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('blur', () => validateInput(el));
    });

    // ===== EDITION ROWS =====
    function addEditionRow(editionVal = '', verifierVal = '') {
        const list = document.getElementById('editionsList');
        const idx  = list.children.length + 1;
        const row  = document.createElement('div');
        row.className = 'edition-row';
        row.innerHTML =
            '<div class="edition-row-inputs">' +
            (idx > 1 ? '<span class="edition-row-number">طبعة ' + idx + '</span>' : '') +
            '<input type="text" class="md-input edition-input" placeholder="دار النشر..." value="' + escapeHTML(editionVal) + '">' +
            '<input type="text" class="md-input verifier-input" placeholder="المحقق..." value="' + escapeHTML(verifierVal) + '">' +
            '</div>' +
            '<button type="button" class="btn-remove-edition" onclick="removeEditionRow(this)" title="حذف">' +
            '<span class="material-icons-round" style="font-size:18px">close</span>' +
            '</button>';
        list.appendChild(row);
        row.querySelectorAll('.md-input').forEach(inp => {
            inp.addEventListener('blur', () => validateInput(inp));
        });
    }

    function removeEditionRow(btn) {
        const list = document.getElementById('editionsList');
        if (list.children.length <= 1) return;
        btn.closest('.edition-row').remove();
        // Re-number badges
        [...list.children].forEach((r, i) => {
            let badge = r.querySelector('.edition-row-number');
            if (i === 0) { if (badge) badge.remove(); }
            else {
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'edition-row-number';
                    r.querySelector('.edition-row-inputs').prepend(badge);
                }
                badge.textContent = 'طبعة ' + (i + 1);
            }
        });
    }

    // Initialize with one edition row
    addEditionRow();

    // ===== TYPE SWITCHER =====
    let currentType = 'book';
    function switchType(type) {
        currentType = type;
        document.getElementById('bookFields').style.display    = type === 'book'    ? '' : 'none';
        document.getElementById('generalFields').style.display = type === 'general' ? '' : 'none';
        document.getElementById('type-btn-book').classList.toggle('active',    type === 'book');
        document.getElementById('type-btn-general').classList.toggle('active', type === 'general');
        hideExistsCard();
        hideError();
    }

    // ===== CHAR COUNTER =====
    const sourceInput  = document.getElementById('sourceInput');
    const charCounter  = document.getElementById('charCounter');
    const MAX_CHARS    = 500;

    sourceInput.addEventListener('input', () => {
        const len = sourceInput.value.length;
        charCounter.textContent = len + ' / ' + MAX_CHARS;
        if (len > MAX_CHARS) {
            sourceInput.value = sourceInput.value.slice(0, MAX_CHARS);
            charCounter.textContent = MAX_CHARS + ' / ' + MAX_CHARS;
        }
        charCounter.style.color = len > MAX_CHARS * 0.9 ? 'var(--md-error)' : 'var(--md-outline)';
    });

    // ===== SUBMIT =====
    document.getElementById('suggestionForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        let payload = {};
        let valid = true;

        if (currentType === 'general') {
            const subjectVal = document.getElementById('subjectInput').value.trim();
            const contentVal = document.getElementById('contentInput').value.trim();
            if (!subjectVal) { validateInput(document.getElementById('subjectInput')); valid = false; }
            if (!contentVal) { validateInput(document.getElementById('contentInput')); valid = false; }
            if (!valid) return;
            payload = { type: 'general', book: subjectVal, edition: contentVal, verifier: '', source: '' };
        } else {
            const bookVal    = bookInput.value.trim();
            const sourceVal  = sourceInput.value.trim();
            const edInputs   = [...document.querySelectorAll('#editionsList .edition-input')];
            const verInputs  = [...document.querySelectorAll('#editionsList .verifier-input')];
            const editions   = edInputs.map(i => i.value.trim());
            const verifiers  = verInputs.map(i => i.value.trim());
            if (!bookVal)     { validateInput(bookInput); valid = false; }
            if (!editions[0]) { validateInput(edInputs[0]); valid = false; }
            if (!verifiers[0]){ validateInput(verInputs[0]); valid = false; }
            if (!sourceVal)   { validateInput(document.getElementById('sourceInput')); valid = false; }
            if (!valid) return;
            if (checkBookExists(bookVal)) return;
            payload = {
                type:     'book',
                book:     bookVal,
                edition:  editions.filter(Boolean).join('##'),
                verifier: verifiers.filter(Boolean).join('##'),
                source:   sourceVal
            };
        }

        // Check configuration
        if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
            showError('⚙️ لم يتم ضبط رابط Apps Script بعد. يرجى مراجعة المسؤول.');
            return;
        }

        setLoading(true);
        hideError();

        try {
            // Submit via hidden form POST → hidden iframe (most reliable with Apps Script)
            const hiddenForm = document.createElement('form');
            hiddenForm.method = 'POST';
            hiddenForm.action = APPS_SCRIPT_URL;
            hiddenForm.target = 'formResponseFrame';
            hiddenForm.style.display = 'none';

            Object.entries(payload).forEach(([key, val]) => {
                const inp = document.createElement('input');
                inp.type = 'hidden';
                inp.name = key;
                inp.value = val;
                hiddenForm.appendChild(inp);
            });

            document.body.appendChild(hiddenForm);
            hiddenForm.submit();
            document.body.removeChild(hiddenForm);

            // iframe load = response received (cross-origin, opaque → assume success)
            const frame = document.getElementById('formResponseFrame');
            const onResp = () => {
                frame.removeEventListener('load', onResp);
                setLoading(false);
                showSuccess();
            };
            frame.addEventListener('load', onResp);
            // Safety timeout if load never fires
            setTimeout(() => {
                frame.removeEventListener('load', onResp);
                setLoading(false);
                showSuccess();
            }, 6000);
            return; // don't reach the finally below
        } catch (err) {
            showError('حدث خطأ في الاتصال. تأكد من اتصالك بالإنترنت وأعد المحاولة.');
        } finally {
            setLoading(false);
        }
    });

    function setLoading(on) {
        const btn    = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const icon   = document.getElementById('submitIcon');
        const label  = document.getElementById('submitLabel');
        btn.disabled = on;
        spinner.style.display = on ? 'block' : 'none';
        icon.style.display    = on ? 'none' : 'inline';
        label.textContent     = on ? 'جاري الإرسال...' : 'إرسال الاقتراح';
    }

    function showSuccess() {
        document.getElementById('suggestionForm').style.display = 'none';
        document.getElementById('successState').classList.add('visible');
    }

    function showError(msg) {
        const fb = document.getElementById('errorFeedback');
        document.getElementById('errorMsg').textContent = msg;
        fb.classList.add('visible');
        fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() {
        document.getElementById('errorFeedback').classList.remove('visible');
    }

    window.resetForm = function() {
        document.getElementById('suggestionForm').reset();
        document.getElementById('suggestionForm').style.display = 'block';
        document.getElementById('successState').classList.remove('visible');
        switchType('book');
        ['bookInput', 'sourceInput', 'subjectInput', 'contentInput'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.classList.remove('valid', 'invalid'); el.disabled = false; }
        });
        // Reset edition rows
        document.getElementById('editionsList').innerHTML = '';
        addEditionRow();
        document.getElementById('btnAddEdition').disabled = false;
        hideExistsCard();
        charCounter.textContent = '0 / 500';
        hideError();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // ===== DARK MODE =====
    (function() {
        if (localStorage.getItem('darkMode') === '1') {
            document.body.classList.add('dark-mode');
        }
        window.addEventListener('storage', e => {
            if (e.key === 'darkMode') {
                document.body.classList.toggle('dark-mode', e.newValue === '1');
            }
        });
    })();
</script>
