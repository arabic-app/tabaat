<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلومات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        html { direction: ltr; } /* scrollbar on right */
        :root {
            --md-primary: #00695c;
            --md-primary-container: #80cbc4;
            --md-on-primary-container: #00201a;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e1e2e4;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #404947;
            --md-outline-variant: #bfc9c6;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
        }
        body.dark-mode {
            --md-primary: #4db6ac;
            --md-primary-container: #004d40;
            --md-on-primary-container: #b2dfdb;
            --md-background: #121212;
            --md-surface: #1e1e1e;
            --md-surface-variant: #2c2c2c;
            --md-on-surface: #e0e0e0;
            --md-on-surface-variant: #a0a0a0;
            --md-outline-variant: #3a3a3a;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.4), 0px 1px 2px 0px rgba(0,0,0,0.5);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--md-background);
            color: var(--md-on-surface);
            margin: 0;
            padding: 12px 12px 32px;
            -webkit-font-smoothing: antialiased;
        }
        #container {
            direction: rtl;
            max-width: 876px;
            margin: 0 auto;
        }
        .info-card {
            background: var(--md-surface);
            border-radius: 16px;
            padding: 20px 22px;
            margin-bottom: 16px;
            box-shadow: var(--md-elevation-1);
            border: 1px solid var(--md-outline-variant);
        }
        .info-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--md-primary);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-title .material-icons-round { font-size: 20px; flex-shrink: 0; }
        .info-desc {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--md-on-surface-variant);
        }
        .info-desc p { margin: 0 0 10px 0; }
        .info-desc p:last-child { margin-bottom: 0; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--md-on-surface-variant);
        }
        .empty-state .material-icons-round {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.4;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="container">
    <div class="empty-state">
        <span class="material-icons-round" style="animation:spin 1s linear infinite">sync</span>
    </div>
</div>
<script>
    if (localStorage.getItem('darkMode') === '1') {
        document.body.classList.add('dark-mode');
    }
    window.addEventListener('storage', e => {
        if (e.key === 'darkMode') {
            document.body.classList.toggle('dark-mode', e.newValue === '1');
        }
    });

    function escapeHTML(str) {
        return String(str || '').replace(/[&<>"']/g, c =>
            ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    // Convert newlines to paragraph tags
    function toParagraphs(text) {
        return text.trim().split(/\n\n+/).map(p =>
            '<p>' + escapeHTML(p.trim()).replace(/\n/g, '<br>') + '</p>'
        ).join('');
    }

    fetch('infos.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(data => {
            const items = Array.isArray(data) ? data : (data ? [data] : []);
            const container = document.getElementById('container');
            if (!items.length) {
                container.innerHTML = '<div class="empty-state"><span class="material-icons-round">info</span><p>لا توجد معلومات.</p></div>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="info-card">
                    <div class="info-title">
                        <span class="material-icons-round">menu_book</span>
                        ${escapeHTML(item.title || '')}
                    </div>
                    <div class="info-desc">${toParagraphs(item.description || '')}</div>
                </div>`).join('');
        })
        .catch(() => {
            document.getElementById('container').innerHTML =
                '<div class="empty-state"><span class="material-icons-round">error_outline</span><p>تعذّر تحميل المعلومات.</p></div>';
        });
</script>
</body>
</html>
