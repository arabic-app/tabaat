<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل طبعات الكتب الإسلامية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: #333; }
        header { background-color: var(--primary-color); color: white; text-align: center; padding: 2rem 1rem; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .search-box { width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 2rem; font-family: inherit; box-sizing: border-box; }
        .search-box:focus { border-color: var(--secondary-color); outline: none; }
        .book-card { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 5px solid var(--secondary-color); }
        .book-title { font-size: 1.5rem; color: var(--primary-color); margin: 0 0 10px 0; }
        .book-meta { color: #666; margin-bottom: 15px; font-size: 0.95rem; }
        .section-title { font-weight: 600; margin-top: 15px; color: #d35400; }
        ul { list-style-type: none; padding: 0; margin: 5px 0; }
        
        /* تنسيق سطور الطبعات */
        li { margin-bottom: 8px; padding: 8px 12px; background: #f1f2f6; border-radius: 5px; }
        .edition-item { display: flex; justify-content: space-between; align-items: center; }
        .edition-name { font-weight: 600; color: #2c3e50; }
        .edition-actions { display: flex; gap: 8px; }
        .icon-btn { cursor: pointer; background: #dfe6e9; border: none; padding: 5px 10px; border-radius: 5px; font-size: 1.1rem; transition: 0.2s; }
        .icon-btn:hover { background: #b2bec3; }
        
        a { color: var(--secondary-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .book-notes { background-color: #fff3cd; color: #856404; padding: 12px 15px; border-radius: 5px; margin-top: 15px; font-size: 0.95rem; border-right: 4px solid #ffeeba; }

        /* نافذة العرض المنبثقة (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: center; }
        .close-modal { position: absolute; top: 10px; left: 15px; font-size: 28px; font-weight: bold; color: #aaa; cursor: pointer; }
        .close-modal:hover { color: #333; }
        #modalTitle { color: var(--primary-color); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #modalBody img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        #modalBody p { font-size: 1.1rem; line-height: 1.6; color: #333; text-align: right; }
    </style>
</head>
<body>

    <header>
        <h1>دليل أفضل طبعات الكتب الإسلامية</h1>
        <p>ابحث عن الكتاب، المؤلف، أو العلم لتعرف أفضل الطبعات المعتمدة</p>
    </header>

    <div class="container">
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن كتاب، مؤلف، أو علم...">
        <div id="booksContainer"></div>
    </div>

    <!-- النافذة المنبثقة للصور والملاحظات -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let booksData = [];

        fetch('books.json')
            .then(response => response.json())
            .then(data => {
                booksData = data;
                displayBooks(booksData);
            })
            .catch(error => console.error('Error loading JSON:', error));

        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            container.innerHTML = '';

            if(books.length === 0) {
                container.innerHTML = '<p style="text-align:center;">لا توجد نتائج مطابقة لبحثك.</p>';
                return;
            }

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';

                const renderEditions = (editions) => {
                    return editions.map(ed => {
                        let actions = '';
                        // زر الملاحظات (i)
                        if (ed.notes && ed.notes.trim() !== '') {
                            actions += `<button class="icon-btn" onclick="openModal('note', '${encodeURIComponent(ed.name)}', '${encodeURIComponent(ed.notes)}')" title="ملاحظات حول الطبعة">ℹ️</button>`;
                        }
                        // زر الصورة
                        if (ed.image && ed.image.trim() !== '') {
                            actions += `<button class="icon-btn" onclick="openModal('image', '${encodeURIComponent(ed.name)}', '${encodeURIComponent(ed.image)}')" title="عرض صورة الغلاف">🖼️</button>`;
                        }

                        return `<li>
                                    <div class="edition-item">
                                        <span class="edition-name">${ed.name}</span>
                                        <div class="edition-actions">${actions}</div>
                                    </div>
                                </li>`;
                    }).join('');
                };

                const renderLinks = (links) => {
                    return links.map(link => `<li><a href="${link.url}" target="_blank">🔗 ${link.title}</a></li>`).join('');
                };

                card.innerHTML = `
                    <h2 class="book-title">${book.title}</h2>
                    <div class="book-meta">
                        <strong>المؤلف:</strong> ${book.author} | <strong>العلم:</strong> ${book.category}
                    </div>
                    
                    <div class="section-title">أفضل الطبعات:</div>
                    <ul>${book.best_editions ? renderEditions(book.best_editions) : ''}</ul>

                    ${book.alt_editions && book.alt_editions.length > 0 ? `<div class="section-title">طبعات بديلة:</div><ul>${renderEditions(book.alt_editions)}</ul>` : ''}
                    
                    ${book.links && book.links.length > 0 ? `<div class="section-title">روابط مفيدة:</div><ul>${renderLinks(book.links)}</ul>` : ''}
                    
                    ${book.notes ? `<div class="book-notes"><strong>📌 ملاحظات الكتاب:</strong> ${book.notes}</div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        // دوال النافذة المنبثقة
        function openModal(type, title, content) {
            document.getElementById('modalTitle').innerText = decodeURIComponent(title);
            const body = document.getElementById('modalBody');
            
            if (type === 'image') {
                body.innerHTML = `<img src="${decodeURIComponent(content)}" alt="غلاف الطبعة">`;
            } else if (type === 'note') {
                body.innerHTML = `<p>${decodeURIComponent(content)}</p>`;
            }
            
            document.getElementById('infoModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        // إغلاق النافذة عند النقر خارجها
        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // البحث
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredBooks = booksData.filter(book => 
                book.title.includes(searchTerm) || 
                book.author.includes(searchTerm) || 
                book.category.includes(searchTerm)
            );
            displayBooks(filteredBooks);
        });
    </script>
</body>
</html>
