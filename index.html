<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل طبعات الكتب الإسلامية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-primary: #00695c;
            --md-on-primary: #ffffff;
            --md-primary-container: #80cbc4;
            --md-on-primary-container: #00201a;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e1e2e4;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #404947;
            --md-outline: #707977;
            --md-outline-variant: #bfc9c6;
            --md-secondary: #006b5f;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
            --md-elevation-2: 0px 2px 6px 2px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body { font-family: 'Cairo', sans-serif; background-color: var(--md-background); margin: 0; padding: 0; color: var(--md-on-surface); -webkit-font-smoothing: antialiased; }

        header { background-color: var(--md-primary); color: var(--md-on-primary); padding: 20px 16px; box-shadow: var(--md-elevation-2); text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0 0 6px 0; font-size: clamp(1.1rem, 4vw, 1.75rem); font-weight: 800; line-height: 1.3; }
        header p  { margin: 0; font-size: clamp(0.8rem, 3vw, 1rem); opacity: 0.9; }

        .container { max-width: 900px; margin: 24px auto; padding: 0 12px; }

        /* SEARCH */
        .search-wrapper { position: relative; margin-bottom: 20px; display: flex; align-items: center; background: var(--md-surface); border-radius: 28px; box-shadow: var(--md-elevation-1); transition: box-shadow 0.2s; }
        .search-wrapper:focus-within { box-shadow: var(--md-elevation-2); outline: 2px solid var(--md-primary); }
        .search-icon { position: absolute; right: 14px; color: var(--md-on-surface-variant); font-size: 24px; pointer-events: none; }
        .search-box { width: 100%; padding: 14px 48px 14px 20px; font-size: 1rem; border: none; border-radius: 28px; font-family: inherit; background: transparent; color: var(--md-on-surface); min-width: 0; }
        .search-box:focus { outline: none; }

        /* ─── CHIPS AREA ───
           Outer = flex row: [scrollable chips] [search button fixed on the right]
           The button never enters the scroll area so it never overlaps chips.        */
        .chips-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Scrollable strip */
        .chips-row {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding-bottom: 2px;
            min-width: 0;
        }
        .chips-row::-webkit-scrollbar { display: none; }

        /* Individual chip */
        .chip {
            background: var(--md-surface);
            border: 1px solid var(--md-outline-variant);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--md-on-surface-variant);
            font-family: inherit;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: inline-flex;
            box-shadow: var(--md-elevation-1);
            flex-shrink: 0;
        }
        .chip:hover  { background: var(--md-surface-variant); }
        .chip.active { background: var(--md-primary-container); color: var(--md-on-primary-container); border-color: var(--md-primary-container); box-shadow: none; }
        .chip.hidden { display: none; }

        /* Science-filter button — sits on the RIGHT, outside the scroll strip */
        .science-filter-wrapper {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            /* field expands to the LEFT (toward chips, in RTL layout) */
            flex-direction: row-reverse;
            background: var(--md-surface);
            border-radius: 21px;
            border: 1px solid var(--md-outline-variant);
            height: 42px;
            width: 42px;
            overflow: hidden;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1), border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--md-elevation-1);
        }
        .science-filter-wrapper.expanded {
            width: 200px;
            border-color: var(--md-primary);
            box-shadow: var(--md-elevation-2), 0 0 0 2px rgba(0,105,92,0.18);
        }
        .science-filter-wrapper.has-filter {
            border-color: var(--md-primary);
            background: var(--md-primary-container);
        }

        .science-filter-btn {
            background: transparent;
            border: none;
            color: var(--md-primary);
            width: 42px;
            min-width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .science-filter-wrapper.has-filter .science-filter-btn { color: var(--md-on-primary-container); }

        .science-filter-input {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--md-on-surface);
            width: 100%;
            /* padding-right pushes text away from the button; padding-left = breathing room */
            padding: 0 4px 0 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            min-width: 0;
            text-align: right;
        }
        .science-filter-input:focus { outline: none; }
        .science-filter-input::placeholder { color: var(--md-outline); }
        .science-filter-wrapper.expanded .science-filter-input { opacity: 1; pointer-events: auto; }

        /* CARDS */
        .md-card { background: var(--md-surface); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: var(--md-elevation-1); border: 1px solid var(--md-outline-variant); overflow: hidden; }
        .md-card:hover { box-shadow: var(--md-elevation-2); }
        .book-title { font-size: clamp(1.1rem, 4vw, 1.5rem); color: var(--md-primary); margin: 0 0 10px 0; font-weight: 800; word-break: break-word; }

        .book-meta { color: var(--md-on-surface-variant); font-size: 0.9rem; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .meta-chip { background: var(--md-background); padding: 4px 10px; border-radius: 16px; border: 1px solid var(--md-outline-variant); font-weight: 600; display: inline-flex; align-items: center; gap: 4px; max-width: 100%; overflow: hidden; }
        .meta-chip span.text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .meta-chip .material-icons-round { font-size: 1rem; color: var(--md-primary); flex-shrink: 0; }

        .section-title { font-weight: 800; margin: 20px 0 10px 0; color: var(--md-secondary); display: flex; align-items: center; gap: 6px; font-size: 1rem; }
        .section-title .material-icons-round { font-size: 1.1rem; flex-shrink: 0; }

        ul { list-style: none; padding: 0; margin: 0; }
        .md-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; margin-bottom: 6px; background: var(--md-background); border-radius: 12px; transition: background 0.2s; gap: 8px; min-width: 0; }
        .md-list-item:hover { background: var(--md-surface-variant); }
        .edition-name { font-weight: 600; font-size: 0.95rem; color: var(--md-on-surface); flex: 1; min-width: 0; word-break: break-word; line-height: 1.5; }
        .edition-actions { display: flex; gap: 4px; flex-shrink: 0; }

        .md-icon-btn { background: transparent; color: var(--md-primary); border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
        .md-icon-btn:hover { background: rgba(0,105,92,0.12); }
        .md-icon-btn .material-icons-round { font-size: 20px; }

        .link-item { text-decoration: none; color: var(--md-primary); font-weight: 600; display: flex; align-items: center; gap: 8px; width: 100%; min-width: 0; }
        .link-item:hover { text-decoration: underline; }
        .link-item .material-icons-round { flex-shrink: 0; font-size: 18px; }

        .book-notes { background-color: #e8f5e9; color: #1b5e20; padding: 14px; border-radius: 12px; margin-top: 20px; font-size: 0.9rem; line-height: 1.6; display: flex; gap: 10px; align-items: flex-start; word-break: break-word; }
        .book-notes .material-icons-round { color: #2e7d32; flex-shrink: 0; margin-top: 2px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(2px); align-items: center; justify-content: center; padding: 16px; }
        .modal-content { background-color: var(--md-surface); border-radius: 24px; width: 100%; max-width: 500px; padding: 24px; position: relative; box-shadow: 0 11px 15px -7px rgba(0,0,0,0.2), 0 24px 38px 3px rgba(0,0,0,0.14), 0 9px 46px 8px rgba(0,0,0,0.12); animation: dialogFadeIn 0.2s ease-out; max-height: 90vh; overflow-y: auto; }
        @keyframes dialogFadeIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
        .close-modal { position: absolute; top: 14px; left: 14px; background: var(--md-surface-variant); color: var(--md-on-surface); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; z-index: 10; border: none; }
        .close-modal:hover { background: var(--md-outline-variant); }
        #modalTitle { margin: 0 0 14px 0; color: var(--md-on-surface); font-size: 1.1rem; font-weight: 800; padding-left: 40px; word-break: break-word; line-height: 1.4; }
        #modalBody { font-size: 0.95rem; line-height: 1.6; color: var(--md-on-surface-variant); }

        /* CAROUSEL */
        .carousel-container { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; background: var(--md-background); border-radius: 12px; overflow: hidden; min-height: 120px; }
        .carousel-img { max-width: 100%; max-height: 55vh; object-fit: contain; display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); color: var(--md-primary); border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--md-elevation-1); transition: 0.2s; }
        .carousel-btn:hover { background: white; box-shadow: var(--md-elevation-2); }
        .carousel-btn.right { right: 8px; }
        .carousel-btn.left  { left: 8px; }
        .carousel-dots { text-align: center; margin-top: 12px; font-weight: 600; color: var(--md-outline); font-size: 0.88rem; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--md-outline); }
        .empty-state .material-icons-round { font-size: 48px; margin-bottom: 10px; display: block; }

        @media (max-width: 480px) {
            .container { padding: 0 10px; margin: 16px auto; }
            .search-box { padding: 12px 40px 12px 16px; font-size: 0.95rem; }
            .search-icon { font-size: 22px; right: 12px; }
            .science-filter-wrapper.expanded { width: 160px; }
            .chip { font-size: 0.88rem; padding: 7px 12px; }
            .md-card { padding: 14px; border-radius: 14px; }
            .book-title { font-size: 1.05rem; }
            .book-meta { gap: 6px; font-size: 0.82rem; }
            .meta-chip { padding: 3px 8px; }
            .section-title { font-size: 0.9rem; }
            .edition-name { font-size: 0.88rem; }
            .md-list-item { padding: 8px 10px; border-radius: 10px; }
            .md-icon-btn { width: 34px; height: 34px; }
            .md-icon-btn .material-icons-round { font-size: 18px; }
            .modal-content { padding: 18px 14px; border-radius: 18px; }
            .carousel-img { max-height: 45vh; }
            .book-notes { font-size: 0.85rem; padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>دليل أفضل طبعات الكتب الإسلامية</h1>
        <p>ابحث عن الكتاب، المؤلف، أو العلم لتعرف أفضل الطبعات المعتمدة</p>
    </header>

    <div class="container">

        <div class="search-wrapper">
            <span class="material-icons-round search-icon">search</span>
            <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن كتاب أو مؤلف..." autocomplete="off">
        </div>

        <!--
          chips-area: [scrollable chips strip]  [science filter button — RIGHT]
          The button is a sibling of the strip, NOT inside it.
        -->
        <div class="chips-area">
            <div class="chips-row" id="chipsRow">
                <!-- chips injected by JS -->
            </div>

            <!-- Science filter: always on the far right, never in the scroll -->
            <div class="science-filter-wrapper" id="scienceFilterWrapper">
                <button class="science-filter-btn" id="scienceFilterBtn" title="فلترة العلوم" aria-label="فلترة العلوم">
                    <span class="material-icons-round">search</span>
                </button>
                <input type="text" id="scienceSearchInput" class="science-filter-input"
                       placeholder="ابحث في العلم..." autocomplete="off"
                       inputmode="search" enterkeyhint="search">
            </div>
        </div>

        <div id="booksContainer"></div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()" aria-label="إغلاق">
                <span class="material-icons-round">close</span>
            </button>
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let booksData = [];
        let currentCarouselImages = [];
        let currentSlideIndex = 0;
        let currentSearchTerm = '';
        let currentCategory   = 'الكل';
        let scienceFilterTerm = ''; // persists across collapse/expand

        fetch('books.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => {
                booksData = data.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ar'));
                initCategories();
                filterAndDisplayBooks();
            });

        /* ---------- CATEGORIES ---------- */
        function getBookCategories(book) {
            if (Array.isArray(book.category)) return book.category;
            if (book.category) return [book.category];
            return [];
        }

        function initCategories() {
            const row = document.getElementById('chipsRow');
            row.innerHTML = '';

            let allCats = [];
            booksData.forEach(b => allCats.push(...getBookCategories(b)));
            const unique = [...new Set(allCats.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ar'));

            [{ label:'الكل', value:'الكل' }, ...unique.map(c => ({ label:c, value:c }))]
                .forEach(({ label, value }) => row.appendChild(createChip(label, value, value === currentCategory)));
        }

        function createChip(label, value, isActive) {
            const btn = document.createElement('button');
            btn.className = `chip${isActive ? ' active' : ''}`;
            btn.textContent = label;
            btn.dataset.value = value;
            btn.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = value;
                filterAndDisplayBooks();
            };
            return btn;
        }

        /* ---------- SCIENCE FILTER ---------- */
        const sfWrapper = document.getElementById('scienceFilterWrapper');
        const sfBtn     = document.getElementById('scienceFilterBtn');
        const sfInput   = document.getElementById('scienceSearchInput');

        sfBtn.addEventListener('click', e => {
            e.stopPropagation();
            sfWrapper.classList.contains('expanded') ? collapseFilter() : expandFilter();
        });

        sfInput.addEventListener('click', e => e.stopPropagation());

        sfInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                collapseFilter(); // hide keyboard + shrink; results intact
            }
        });

        sfInput.addEventListener('input', () => {
            scienceFilterTerm = sfInput.value.trim().toLowerCase();
            applyChipFilter();
        });

        // Collapse on outside click — results preserved
        document.addEventListener('click', () => collapseFilter());

        function expandFilter() {
            sfWrapper.classList.add('expanded');
            sfInput.focus();
        }

        function collapseFilter() {
            sfWrapper.classList.remove('expanded');
            sfInput.blur();
            // scienceFilterTerm and chip visibility preserved intentionally
        }

        function applyChipFilter() {
            document.querySelectorAll('.chip').forEach(chip => {
                const val = chip.dataset.value;
                chip.classList.toggle('hidden',
                    val !== 'الكل' && !val.toLowerCase().includes(scienceFilterTerm)
                );
            });
            sfWrapper.classList.toggle('has-filter', scienceFilterTerm !== '');
        }

        /* ---------- MAIN SEARCH ---------- */
        const mainSearch = document.getElementById('searchInput');
        mainSearch.addEventListener('input', e => {
            currentSearchTerm = e.target.value.toLowerCase();
            filterAndDisplayBooks();
        });
        mainSearch.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); mainSearch.blur(); }
        });

        /* ---------- FILTER + DISPLAY ---------- */
        function filterAndDisplayBooks() {
            const filtered = booksData.filter(book => {
                const matchSearch =
                    (book.title  && book.title.toLowerCase().includes(currentSearchTerm)) ||
                    (book.author && book.author.toLowerCase().includes(currentSearchTerm));
                const cats = getBookCategories(book);
                const matchCat = currentCategory === 'الكل' || cats.includes(currentCategory);
                return matchSearch && matchCat;
            });
            displayBooks(filtered);
        }

        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            container.innerHTML = '';

            if (!books.length) {
                container.innerHTML = `<div class="empty-state"><span class="material-icons-round">search_off</span><h3>لا توجد نتائج مطابقة لبحثك في هذا القسم.</h3></div>`;
                return;
            }

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'md-card';

                const catsHTML = getBookCategories(book).map(cat => `
                    <span class="meta-chip">
                        <span class="material-icons-round">category</span>
                        <span class="text">${cat}</span>
                    </span>`).join('');

                const renderList = (items, isEdition, type) => (items || []).map((ed, idx) => {
                    let actions = '';
                    if (isEdition && ed.notes) actions += `<button class="md-icon-btn" onclick="openNoteModal('${encodeURIComponent(ed.name)}','${encodeURIComponent(ed.notes)}')" title="ملاحظات"><span class="material-icons-round">info</span></button>`;
                    if (isEdition && ((ed.images && ed.images.length) || ed.image)) actions += `<button class="md-icon-btn" onclick="openImageModal(${book.id},'${type}',${idx})" title="صور"><span class="material-icons-round">photo_library</span></button>`;
                    return isEdition
                        ? `<li class="md-list-item"><span class="edition-name">${ed.name}</span><div class="edition-actions">${actions}</div></li>`
                        : `<li class="md-list-item"><a href="${ed.url}" target="_blank" rel="noopener" class="link-item"><span class="material-icons-round">open_in_new</span><span class="edition-name">${ed.title}</span></a></li>`;
                }).join('');

                card.innerHTML = `
                    <h2 class="book-title">${book.title}</h2>
                    <div class="book-meta">
                        <span class="meta-chip"><span class="material-icons-round">person</span><span class="text">${book.author}</span></span>
                        ${catsHTML}
                    </div>
                    ${book.best_editions?.length ? `<div class="section-title"><span class="material-icons-round">verified</span> أفضل الطبعات:</div><ul>${renderList(book.best_editions, true, 'best_editions')}</ul>` : ''}
                    ${book.alt_editions?.length  ? `<div class="section-title"><span class="material-icons-round">rule</span> طبعات بديلة جيدة:</div><ul>${renderList(book.alt_editions, true, 'alt_editions')}</ul>` : ''}
                    ${book.links?.length         ? `<div class="section-title"><span class="material-icons-round">link</span> روابط مفيدة:</div><ul>${renderList(book.links, false)}</ul>` : ''}
                    ${book.notes ? `<div class="book-notes"><span class="material-icons-round">lightbulb</span><div>${book.notes}</div></div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        /* ---------- MODAL ---------- */
        function openNoteModal(title, content) {
            document.getElementById('modalTitle').innerText = decodeURIComponent(title);
            document.getElementById('modalBody').innerHTML = `<p>${decodeURIComponent(content)}</p>`;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function openImageModal(bookId, edType, index) {
            const ed = booksData.find(b => b.id === bookId)[edType][index];
            document.getElementById('modalTitle').innerText = ed.name;
            currentCarouselImages = ed.images?.length ? ed.images : (ed.image ? [ed.image] : []);
            currentSlideIndex = 0;
            renderCarousel();
            document.getElementById('infoModal').style.display = 'flex';
        }

        function renderCarousel() {
            const body = document.getElementById('modalBody');
            if (currentCarouselImages.length <= 1) {
                body.innerHTML = `<div class="carousel-container"><img src="${currentCarouselImages[0]}" class="carousel-img" alt="غلاف الطبعة"></div>`;
            } else {
                body.innerHTML = `
                    <div class="carousel-container">
                        <button class="carousel-btn right" onclick="changeSlide(-1)"><span class="material-icons-round">chevron_right</span></button>
                        <img src="${currentCarouselImages[currentSlideIndex]}" class="carousel-img" alt="غلاف الطبعة">
                        <button class="carousel-btn left"  onclick="changeSlide(1)"><span class="material-icons-round">chevron_left</span></button>
                    </div>
                    <div class="carousel-dots">صورة ${currentSlideIndex + 1} من ${currentCarouselImages.length}</div>`;
            }
        }

        function changeSlide(dir) {
            currentSlideIndex = (currentSlideIndex + dir + currentCarouselImages.length) % currentCarouselImages.length;
            renderCarousel();
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        window.addEventListener('click', e => { if (e.target.id === 'infoModal') closeModal(); });
    </script>
</body>
</html>
