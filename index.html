<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل طبعات الكتب الإسلامية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-primary: #00695c;
            --md-on-primary: #ffffff;
            --md-primary-container: #80cbc4;
            --md-on-primary-container: #00201a;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e1e2e4;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #404947;
            --md-outline: #707977;
            --md-outline-variant: #bfc9c6;
            --md-secondary: #006b5f;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
            --md-elevation-2: 0px 2px 6px 2px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body { font-family: 'Cairo', sans-serif; background-color: var(--md-background); margin: 0; padding: 0; color: var(--md-on-surface); -webkit-font-smoothing: antialiased; }
        header { background-color: var(--md-primary); color: var(--md-on-primary); padding: 20px 16px; box-shadow: var(--md-elevation-2); text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0 0 6px 0; font-size: clamp(1.1rem, 4vw, 1.75rem); font-weight: 800; }
        header p { margin: 0; font-size: clamp(0.8rem, 3vw, 1rem); opacity: 0.9; }

        .container { max-width: 900px; margin: 24px auto; padding: 0 12px; }

        /* ===== SEARCH ===== */
        .search-wrapper { position: relative; margin-bottom: 20px; display: flex; align-items: center; background: var(--md-surface); border-radius: 28px; box-shadow: var(--md-elevation-1); transition: box-shadow 0.2s; }
        .search-wrapper:focus-within { box-shadow: var(--md-elevation-2); outline: 2px solid var(--md-primary); }
        .search-icon { position: absolute; right: 16px; color: var(--md-on-surface-variant); font-size: 26px; pointer-events: none; }
        .search-box { width: 100%; padding: 16px 48px 16px 20px; font-size: 1rem; border: none; border-radius: 28px; font-family: inherit; background: transparent; color: var(--md-on-surface); }
        .search-box:focus { outline: none; }

        /* ===== SCIENCE CHIPS & FILTER ===== */
        .chips-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .science-filter-wrapper { display: flex; align-items: center; background: var(--md-surface); border-radius: 24px; border: 1px solid var(--md-outline-variant); height: 42px; width: 42px; overflow: hidden; transition: all 0.3s; flex-shrink: 0; box-shadow: var(--md-elevation-1); }
        .science-filter-wrapper.expanded { width: 200px; padding-left: 12px; }
        .science-filter-btn { background: transparent; border: none; color: var(--md-primary); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; outline: none; }
        .science-filter-input { border: none; background: transparent; font-family: inherit; font-size: 0.95rem; color: var(--md-on-surface); width: 100%; padding: 0; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .science-filter-input:focus { outline: none; }
        .science-filter-wrapper.expanded .science-filter-input { opacity: 1; pointer-events: auto; }

        .category-chips { display: flex; flex: 1; gap: 8px; overflow-x: auto; padding: 4px 0; -ms-overflow-style: none; scrollbar-width: none; }
        .category-chips::-webkit-scrollbar { display: none; }
        .chip { background: var(--md-surface); border: 1px solid var(--md-outline-variant); padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 0.95rem; color: var(--md-on-surface-variant); font-family: inherit; transition: 0.2s; display: inline-flex; box-shadow: var(--md-elevation-1); }
        .chip:hover { background: var(--md-surface-variant); }
        .chip.active { background: var(--md-primary-container); color: var(--md-on-primary-container); border-color: var(--md-primary-container); box-shadow: none; }

        /* ===== CARDS & DETAILS ===== */
        .md-card { background: var(--md-surface); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: var(--md-elevation-1); border: 1px solid var(--md-outline-variant); }
        .book-title { font-size: clamp(1.1rem, 4vw, 1.5rem); color: var(--md-primary); margin: 0 0 10px 0; font-weight: 800; word-break: break-word; }
        
        .book-meta { color: var(--md-on-surface-variant); font-size: 0.9rem; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .meta-chip { background: var(--md-background); padding: 4px 10px; border-radius: 16px; border: 1px solid var(--md-outline-variant); font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .meta-chip .material-icons-round { font-size: 1rem; color: var(--md-primary); }
        
        .section-title { font-weight: 800; margin: 20px 0 10px 0; color: var(--md-secondary); display: flex; align-items: center; gap: 6px; font-size: 1rem; }
        .section-title .material-icons-round { font-size: 1.1rem; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        .md-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; margin-bottom: 6px; background: var(--md-background); border-radius: 12px; }
        .edition-name { font-weight: 600; font-size: 0.95rem; line-height: 1.5; flex: 1; word-break: break-word; }
        .edition-actions { display: flex; gap: 4px; flex-shrink: 0; }
        
        .md-icon-btn { background: transparent; color: var(--md-primary); border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; }
        .md-icon-btn:hover { background: rgba(0, 105, 92, 0.12); }
        .md-icon-btn .material-icons-round { font-size: 20px; }
        
        .link-item { text-decoration: none; color: var(--md-primary); font-weight: 600; display: flex; align-items: center; gap: 8px; width: 100%; }
        .book-notes { background-color: #e8f5e9; color: #1b5e20; padding: 14px; border-radius: 12px; margin-top: 20px; font-size: 0.9rem; line-height: 1.6; display: flex; gap: 10px; }
        .book-notes .material-icons-round { color: #2e7d32; }

        /* ===== MODAL ===== */
        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); align-items: center; justify-content: center; padding: 16px; }
        .modal-content { background: var(--md-surface); border-radius: 24px; width: 100%; max-width: 500px; padding: 24px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 14px; left: 14px; background: var(--md-surface-variant); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
        #modalTitle { margin: 0 0 14px 0; font-size: 1.1rem; padding-left: 40px; color: var(--md-primary); font-weight: 800; }
        
        /* ===== CAROUSEL ===== */
        .carousel-container { position: relative; display: flex; justify-content: center; align-items: center; background: var(--md-background); border-radius: 12px; min-height: 120px; }
        .carousel-img { max-width: 100%; max-height: 55vh; object-fit: contain; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); color: var(--md-primary); border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; box-shadow: var(--md-elevation-1); }
        .carousel-btn.right { right: 8px; }
        .carousel-btn.left  { left: 8px; }
        .carousel-dots { text-align: center; margin-top: 12px; font-weight: 600; color: var(--md-outline); font-size: 0.88rem; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--md-outline); }

        @media (max-width: 480px) {
            .container { padding: 0 10px; margin: 16px auto; }
            .search-box { padding: 12px 40px 12px 16px; font-size: 0.95rem; }
            .md-card { padding: 14px; border-radius: 14px; }
            .book-title { font-size: 1.05rem; }
            .book-meta { font-size: 0.82rem; }
            .edition-name { font-size: 0.88rem; }
            .md-icon-btn { width: 34px; height: 34px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>دليل أفضل طبعات الكتب الإسلامية</h1>
        <p>ابحث عن الكتاب، المؤلف، أو العلم لتعرف أفضل الطبعات المعتمدة</p>
    </header>

    <div class="container">
        <div class="search-wrapper">
            <span class="material-icons-round search-icon">search</span>
            <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن كتاب أو مؤلف..." autocomplete="off">
        </div>
        
        <div class="chips-row">
            <div class="science-filter-wrapper" id="scienceFilterWrapper">
                <button class="science-filter-btn" id="scienceFilterBtn"><span class="material-icons-round">search</span></button>
                <input type="text" id="scienceSearchInput" class="science-filter-input" placeholder="ابحث في العلوم..." autocomplete="off">
            </div>
            <div class="category-chips" id="categoryChips"></div>
        </div>

        <div id="booksContainer"></div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()"><span class="material-icons-round">close</span></button>
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let booksData = [];
        let currentCarouselImages = [];
        let currentSlideIndex = 0;
        let currentSearchTerm = '';
        let currentCategory = 'الكل';

        fetch('books.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => { 
                booksData = data.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ar'));
                initCategories();
                filterAndDisplayBooks(); 
            });

        // دوال مساعدة للتعامل مع التصنيفات بأمان (قد تكون نصاً أو مصفوفة)
        function getBookCategories(book) {
            if (Array.isArray(book.category)) return book.category;
            if (book.category) return [book.category];
            return [];
        }

        function initCategories() {
            const container = document.getElementById('categoryChips');
            container.innerHTML = '';
            
            // استخراج جميع العلوم الفريدة
            let allCategories = [];
            booksData.forEach(b => allCategories.push(...getBookCategories(b)));
            const uniqueCategories = [...new Set(allCategories.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ar'));
            
            container.appendChild(createChip('الكل', 'الكل', true));
            uniqueCategories.forEach(cat => container.appendChild(createChip(cat, cat, false)));
        }

        function createChip(label, value, isActive) {
            const btn = document.createElement('button');
            btn.className = `chip ${isActive ? 'active' : ''}`;
            btn.innerText = label;
            btn.dataset.value = value;
            btn.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = value;
                filterAndDisplayBooks();
            };
            return btn;
        }

        // تفاعلات البحث والفلترة
        const sfWrapper = document.getElementById('scienceFilterWrapper');
        const sfBtn = document.getElementById('scienceFilterBtn');
        const sfInput = document.getElementById('scienceSearchInput');

        sfBtn.onclick = () => {
            sfWrapper.classList.toggle('expanded');
            if (sfWrapper.classList.contains('expanded')) sfInput.focus();
        };

        sfInput.onkeydown = (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sfInput.blur(); sfWrapper.classList.remove('expanded'); }
        };

        sfInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.chip').forEach(chip => {
                chip.style.display = (chip.dataset.value === 'الكل' || chip.dataset.value.toLowerCase().includes(term)) ? 'inline-flex' : 'none';
            });
        };

        const mainSearch = document.getElementById('searchInput');
        mainSearch.oninput = (e) => { currentSearchTerm = e.target.value.toLowerCase(); filterAndDisplayBooks(); };
        mainSearch.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); mainSearch.blur(); } };

        function filterAndDisplayBooks() {
            const filtered = booksData.filter(book => {
                const matchesSearch = (book.title && book.title.toLowerCase().includes(currentSearchTerm)) ||
                                      (book.author && book.author.toLowerCase().includes(currentSearchTerm));
                
                const cats = getBookCategories(book);
                const matchesCategory = currentCategory === 'الكل' || cats.includes(currentCategory);
                
                return matchesSearch && matchesCategory;
            });
            displayBooks(filtered);
        }

        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            container.innerHTML = '';

            if (books.length === 0) {
                container.innerHTML = `<div class="empty-state"><span class="material-icons-round">search_off</span><h3>لا نتائج</h3></div>`;
                return;
            }

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'md-card';

                // رسم تصنيفات الكتاب كـ Chips متعددة
                const bookCats = getBookCategories(book);
                const catsHTML = bookCats.map(cat => `
                    <span class="meta-chip">
                        <span class="material-icons-round">category</span>
                        <span class="text">${cat}</span>
                    </span>
                `).join('');

                const renderList = (editions, isEdition, type) => (editions || []).map((ed, idx) => {
                    let actions = '';
                    if (isEdition && ed.notes) actions += `<button class="md-icon-btn" onclick="openNoteModal('${encodeURIComponent(ed.name)}', '${encodeURIComponent(ed.notes)}')"><span class="material-icons-round">info</span></button>`;
                    if (isEdition && ((ed.images && ed.images.length) || ed.image)) actions += `<button class="md-icon-btn" onclick="openImageModal(${book.id}, '${type}', ${idx})"><span class="material-icons-round">photo_library</span></button>`;
                    
                    return isEdition 
                        ? `<li class="md-list-item"><span class="edition-name">${ed.name}</span><div class="edition-actions">${actions}</div></li>`
                        : `<li class="md-list-item"><a href="${ed.url}" target="_blank" class="link-item"><span class="material-icons-round">open_in_new</span><span class="edition-name">${ed.title}</span></a></li>`;
                }).join('');

                card.innerHTML = `
                    <h2 class="book-title">${book.title}</h2>
                    <div class="book-meta">
                        <span class="meta-chip"><span class="material-icons-round">person</span><span class="text">${book.author}</span></span>
                        ${catsHTML}
                    </div>
                    ${book.best_editions?.length ? `<div class="section-title"><span class="material-icons-round">verified</span> أفضل الطبعات:</div><ul>${renderList(book.best_editions, true, 'best_editions')}</ul>` : ''}
                    ${book.alt_editions?.length ? `<div class="section-title"><span class="material-icons-round">rule</span> بدائل جيدة:</div><ul>${renderList(book.alt_editions, true, 'alt_editions')}</ul>` : ''}
                    ${book.links?.length ? `<div class="section-title"><span class="material-icons-round">link</span> روابط:</div><ul>${renderList(book.links, false)}</ul>` : ''}
                    ${book.notes ? `<div class="book-notes"><span class="material-icons-round">lightbulb</span><div>${book.notes}</div></div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        /* دوال العرض المنبثق (Modal & Carousel) */
        function openNoteModal(title, content) {
            document.getElementById('modalTitle').innerText = decodeURIComponent(title);
            document.getElementById('modalBody').innerHTML = `<p>${decodeURIComponent(content)}</p>`;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function openImageModal(bookId, edType, index) {
            const ed = booksData.find(b => b.id === bookId)[edType][index];
            document.getElementById('modalTitle').innerText = ed.name;
            currentCarouselImages = ed.images?.length ? ed.images : (ed.image ? [ed.image] : []);
            currentSlideIndex = 0;
            renderCarousel();
            document.getElementById('infoModal').style.display = 'flex';
        }

        function renderCarousel() {
            const body = document.getElementById('modalBody');
            if (currentCarouselImages.length <= 1) {
                body.innerHTML = `<div class="carousel-container"><img src="${currentCarouselImages[0]}" class="carousel-img"></div>`;
            } else {
                body.innerHTML = `
                    <div class="carousel-container">
                        <button class="carousel-btn right" dir="ltr" onclick="changeSlide(-1)"><span class="material-icons-round">chevron_right</span></button>
                        <img src="${currentCarouselImages[currentSlideIndex]}" class="carousel-img">
                        <button class="carousel-btn left" dir="ltr" onclick="changeSlide(1)"><span class="material-icons-round">chevron_left</span></button>
                    </div>
                    <div class="carousel-dots">صورة ${currentSlideIndex + 1} من ${currentCarouselImages.length}</div>`;
            }
        }
        function changeSlide(dir) { currentSlideIndex = (currentSlideIndex + dir + currentCarouselImages.length) % currentCarouselImages.length; renderCarousel(); }
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        window.onclick = e => { if (e.target.id === 'infoModal') closeModal(); };
    </script>
</body>
</html>
