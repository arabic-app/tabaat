<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل طبعات الكتب الإسلامية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-primary: #00695c;
            --md-on-primary: #ffffff;
            --md-primary-container: #80cbc4;
            --md-on-primary-container: #00201a;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e1e2e4;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #404947;
            --md-outline: #707977;
            --md-outline-variant: #bfc9c6;
            --md-secondary: #006b5f;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
            --md-elevation-2: 0px 2px 6px 2px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--md-background);
            margin: 0;
            padding: 0;
            color: var(--md-on-surface);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HEADER ===== */
        header {
            background-color: var(--md-primary);
            color: var(--md-on-primary);
            padding: 20px 16px;
            box-shadow: var(--md-elevation-2);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            margin: 0 0 6px 0;
            font-size: clamp(1.1rem, 4vw, 1.75rem);
            font-weight: 800;
            line-height: 1.3;
        }
        header p {
            margin: 0;
            font-size: clamp(0.8rem, 3vw, 1rem);
            opacity: 0.9;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 12px;
        }

        /* ===== SEARCH ===== */
        .search-wrapper {
            position: relative;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            background: var(--md-surface);
            border-radius: 28px;
            box-shadow: var(--md-elevation-1);
            transition: box-shadow 0.2s;
        }
        .search-wrapper:focus-within {
            box-shadow: var(--md-elevation-2);
            outline: 2px solid var(--md-primary);
        }
        .search-icon {
            position: absolute;
            right: 14px;
            color: var(--md-on-surface-variant);
            font-size: 24px;
            pointer-events: none;
            flex-shrink: 0;
        }
        .search-box {
            width: 100%;
            padding: 14px 48px 14px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 28px;
            font-family: inherit;
            background: transparent;
            color: var(--md-on-surface);
            min-width: 0;
        }
        .search-box:focus { outline: none; }

        /* ===== CATEGORY CHIPS (شريط التصنيفات) ===== */
        .category-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
            -ms-overflow-style: none; /* إخفاء شريط التمرير في إنترنت إكسبلورر */
            scrollbar-width: none; /* إخفاء شريط التمرير في فايرفوكس */
        }
        .category-chips::-webkit-scrollbar { display: none; } /* إخفاء شريط التمرير في كروم وسفاري */

        .chip {
            background: var(--md-surface);
            border: 1px solid var(--md-outline-variant);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--md-on-surface-variant);
            font-family: inherit;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .chip:hover {
            background: var(--md-surface-variant);
        }
        .chip.active {
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            border-color: var(--md-primary-container);
        }

        /* ===== CARDS ===== */
        .md-card {
            background: var(--md-surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--md-elevation-1);
            border: 1px solid var(--md-outline-variant);
            overflow: hidden;
        }
        .md-card:hover { box-shadow: var(--md-elevation-2); }

        .book-title {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            color: var(--md-primary);
            margin: 0 0 10px 0;
            font-weight: 800;
            word-break: break-word;
        }

        /* ===== META CHIPS ===== */
        .book-meta {
            color: var(--md-on-surface-variant);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .meta-chip {
            background: var(--md-background);
            padding: 4px 10px;
            border-radius: 16px;
            border: 1px solid var(--md-outline-variant);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            max-width: 100%;
            overflow: hidden;
        }
        .meta-chip span.text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .meta-chip .material-icons-round {
            font-size: 1rem;
            color: var(--md-primary);
            flex-shrink: 0;
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-weight: 800;
            margin: 20px 0 10px 0;
            color: var(--md-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
        }
        .section-title .material-icons-round { font-size: 1.1rem; flex-shrink: 0; }

        /* ===== LISTS ===== */
        ul { list-style: none; padding: 0; margin: 0; }

        .md-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: var(--md-background);
            border-radius: 12px;
            transition: background 0.2s;
            gap: 8px;
            min-width: 0;
        }
        .md-list-item:hover { background: var(--md-surface-variant); }

        .edition-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--md-on-surface);
            flex: 1;
            min-width: 0;
            word-break: break-word;
            line-height: 1.5;
        }

        .edition-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        /* ===== ICON BUTTONS ===== */
        .md-icon-btn {
            background: transparent;
            color: var(--md-primary);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .md-icon-btn:hover { background: rgba(0, 105, 92, 0.12); }
        .md-icon-btn .material-icons-round { font-size: 20px; }

        /* ===== LINKS ===== */
        .link-item {
            text-decoration: none;
            color: var(--md-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            min-width: 0;
        }
        .link-item:hover { text-decoration: underline; }
        .link-item .material-icons-round { flex-shrink: 0; font-size: 18px; }

        /* ===== BOOK NOTES ===== */
        .book-notes {
            background-color: #e8f5e9;
            color: #1b5e20;
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            word-break: break-word;
        }
        .book-notes .material-icons-round { color: #2e7d32; flex-shrink: 0; margin-top: 2px; }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            background-color: var(--md-surface);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            position: relative;
            box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14), 0px 9px 46px 8px rgba(0,0,0,0.12);
            animation: dialogFadeIn 0.2s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes dialogFadeIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
            border: none;
        }
        .close-modal:hover { background: var(--md-outline-variant); }

        #modal
