<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل طبعات الكتب الإسلامية</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00695c">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="أفضل طبعة">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <!-- SEO -->
    <meta name="description" content="دليل شامل لأفضل طبعات الكتب الإسلامية - ابحث عن الكتاب، المؤلف، أو العلم">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-primary: #00695c;
            --md-on-primary: #ffffff;
            --md-primary-container: #80cbc4;
            --md-on-primary-container: #00201a;
            --md-background: #f4f6f8;
            --md-surface: #ffffff;
            --md-surface-variant: #e1e2e4;
            --md-on-surface: #191c1b;
            --md-on-surface-variant: #404947;
            --md-outline: #707977;
            --md-outline-variant: #bfc9c6;
            --md-secondary: #006b5f;
            --md-elevation-1: 0px 1px 3px 1px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
            --md-elevation-2: 0px 2px 6px 2px rgba(0,0,0,0.15), 0px 1px 2px 0px rgba(0,0,0,0.30);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--md-background);
            margin: 0;
            padding: 0;
            color: var(--md-on-surface);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HEADER ===== */
        header {
            background-color: var(--md-primary);
            color: var(--md-on-primary);
            padding: 24px 16px;
            text-align: center;
        }
        header h1 {
            margin: 0 0 6px 0;
            font-size: clamp(1.1rem, 4vw, 1.75rem);
            font-weight: 800;
            line-height: 1.3;
        }
        header p {
            margin: 0;
            font-size: clamp(0.8rem, 3vw, 1rem);
            opacity: 0.9;
        }
        .last-update {
            font-size: 0.85rem;
            color: #b2dfdb;
            margin-top: 6px;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            direction: rtl;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 12px 24px;
        }

        /* ===== FILTER STICKY WRAPPER ===== */
        .filter-sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--md-background);
            padding: 12px 0 6px;
            width: 100%;
        }
        .filter-bar {
            max-width: 876px;
            width: calc(100% - 24px);
            margin: 0 auto;
            background: var(--md-surface);
            border-radius: 14px;
            padding: 12px;
            box-shadow: var(--md-elevation-1);
        }

        /* ===== MAIN SEARCH ===== */
        .search-wrapper {
            position: relative;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            background: var(--md-surface-variant);
            border-radius: 28px;
            transition: box-shadow 0.2s;
        }
        .search-wrapper:focus-within {
            outline: 2px solid var(--md-primary);
        }
        .search-icon {
            position: absolute;
            right: 14px;
            color: var(--md-on-surface-variant);
            font-size: 24px;
            pointer-events: none;
            flex-shrink: 0;
        }
        .search-box {
            width: 100%;
            padding: 12px 48px 12px 44px;
            font-size: 1rem;
            border: none;
            border-radius: 28px;
            font-family: inherit;
            background: transparent;
            color: var(--md-on-surface);
            min-width: 0;
        }
        .search-box::placeholder { color: var(--md-on-surface-variant); }
        .search-box:focus { outline: none; }
        .clear-search-btn {
            position: absolute;
            left: 14px;
            background: transparent;
            border: none;
            color: var(--md-on-surface-variant);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .clear-search-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        /* ===== CHIPS ROW ===== */
        .chips-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 0;
        }

        .science-filter-wrapper {
            display: flex;
            align-items: center;
            background: var(--md-surface-variant);
            border-radius: 24px;
            border: 1px solid var(--md-outline-variant);
            height: 38px;
            width: 38px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            box-shadow: var(--md-elevation-1);
        }
        .science-filter-wrapper.expanded { width: 200px; padding-left: 12px; }
        
        .science-filter-btn {
            background: transparent;
            border: none;
            color: var(--md-primary);
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            outline: none;
        }
        .science-filter-input {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--md-on-surface);
            width: 100%;
            padding: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .science-filter-input::placeholder { color: var(--md-on-surface-variant); }
        .science-filter-input:focus { outline: none; }
        .science-filter-wrapper.expanded .science-filter-input { opacity: 1; pointer-events: auto; }
        .clear-science-btn {
            background: transparent;
            border: none;
            color: var(--md-on-surface-variant);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
            margin-left: 4px;
            flex-shrink: 0;
        }
        .clear-science-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .category-chips {
            display: flex;
            flex: 1;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        .category-chips::-webkit-scrollbar { display: none; } 

        .chip {
            background: var(--md-surface-variant);
            border: 1px solid var(--md-outline-variant);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--md-on-surface-variant);
            font-family: inherit;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: inline-flex;
        }
        .chip:hover { background: var(--md-outline-variant); }
        .chip.active {
            background: var(--md-primary);
            color: #fff;
            border-color: var(--md-primary);
            font-weight: 700;
        }


        /* ===== CARDS ===== */

        .md-card {
            background: var(--md-surface);
            border-radius: 16px;
            padding: 20px;
            padding-bottom: 42px; /* space for the absolute date */
            margin-bottom: 20px;
            box-shadow: var(--md-elevation-1);
            border: 1px solid var(--md-outline-variant);
            overflow: hidden; 
            position: relative;
        }
        .md-card:hover { box-shadow: var(--md-elevation-2); }

        .book-date {
            position: absolute;
            bottom: 12px;
            right: 20px;
            font-size: 0.72rem;
            font-weight: 300;
            opacity: 0.55;
            color: var(--md-on-surface-variant);
            direction: rtl;
        }

        .book-title {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            color: var(--md-primary);
            margin: 0 0 10px 0;
            font-weight: 800;
            word-break: break-word;
        }

        /* ===== META CHIPS ===== */
        .book-meta {
            color: var(--md-on-surface-variant);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .meta-chip {
            background: var(--md-background);
            padding: 4px 10px;
            border-radius: 16px;
            border: 1px solid var(--md-outline-variant);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            max-width: 100%;
            overflow: hidden;
        }
        .meta-chip span.text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .meta-chip .material-icons-round { font-size: 1rem; color: var(--md-primary); flex-shrink: 0; }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-weight: 800;
            margin: 20px 0 10px 0;
            color: var(--md-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
        }
        .section-title .material-icons-round { font-size: 1.1rem; flex-shrink: 0; }

        /* ===== LISTS ===== */
        ul { list-style: none; padding: 0; margin: 0; }

        .md-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: var(--md-background);
            border-radius: 12px;
            transition: background 0.2s;
            gap: 8px;
            min-width: 0; 
        }
        .md-list-item:hover { background: var(--md-surface-variant); }

        .edition-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--md-on-surface);
            flex: 1;
            min-width: 0; 
            word-break: break-word;
            line-height: 1.5;
        }

        .edition-actions { display: flex; gap: 4px; flex-shrink: 0; }

        /* ===== ICON BUTTONS ===== */
        .md-icon-btn {
            background: transparent;
            color: var(--md-primary);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .md-icon-btn:hover { background: rgba(0, 105, 92, 0.12); }
        .md-icon-btn .material-icons-round { font-size: 20px; }

        /* ===== LINKS ===== */
        .link-item {
            text-decoration: none;
            color: var(--md-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            min-width: 0;
        }
        .link-item:hover { text-decoration: underline; }
        .link-item .material-icons-round { flex-shrink: 0; font-size: 18px; }

        /* ===== BOOK NOTES ===== */
        .book-notes {
            background-color: #e8f5e9;
            color: #1b5e20;
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            word-break: break-word;
        }
        .book-notes .material-icons-round { color: #2e7d32; flex-shrink: 0; margin-top: 2px; }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            background-color: var(--md-surface);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            position: relative;
            box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14), 0px 9px 46px 8px rgba(0,0,0,0.12);
            animation: dialogFadeIn 0.2s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes dialogFadeIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
            border: none;
        }
        .close-modal:hover { background: var(--md-outline-variant); }

        #modalTitle {
            margin: 0 0 14px 0;
            color: var(--md-on-surface);
            font-size: 1.1rem;
            font-weight: 800;
            padding-left: 40px;
            word-break: break-word;
            line-height: 1.4;
        }
        #modalBody { font-size: 0.95rem; line-height: 1.6; color: var(--md-on-surface-variant); }
        #modalBody ul { list-style: disc; padding-right: 20px; margin: 8px 0; }
        #modalBody ol { list-style: decimal; padding-right: 20px; margin: 8px 0; }
        #modalBody li { margin-bottom: 4px; }
        #modalBody a { color: var(--md-primary); text-decoration: underline; }

        /* ===== CAROUSEL ===== */
        .carousel-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: var(--md-background);
            border-radius: 12px;
            overflow: hidden;
            min-height: 120px;
        }
        .carousel-img {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            display: block;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.85);
            color: var(--md-primary);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--md-elevation-1);
            transition: 0.2s;
        }
        .carousel-btn:hover { background: white; box-shadow: var(--md-elevation-2); }
        .carousel-btn.right { right: 8px; }
        .carousel-btn.left  { left: 8px; }
        .carousel-dots {
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
            color: var(--md-outline);
            font-size: 0.88rem;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--md-outline);
        }
        .empty-state .material-icons-round {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container { padding: 0 10px; margin: 16px auto; }
            .search-box { padding: 12px 40px 12px 16px; font-size: 0.95rem; }
            .search-icon { font-size: 22px; right: 12px; }
            
            /* -- تم إصلاح التجاوب هنا ليبقى في نفس السطر -- */
            .chips-row { flex-direction: row; align-items: center; gap: 8px; }
            .science-filter-wrapper { width: 40px; height: 40px; border-radius: 20px; }
            .science-filter-btn { width: 40px; height: 40px; }
            .science-filter-wrapper.expanded { width: 160px; }
            
            .category-chips { padding-bottom: 4px; }
            
            .md-card { padding: 14px; padding-bottom: 34px; border-radius: 14px; }
            .book-date { bottom: 8px; right: 14px; font-size: 0.55rem; }
            .book-title { font-size: 1.05rem; }
            .book-meta { gap: 6px; font-size: 0.82rem; }
            .meta-chip { padding: 3px 8px; }
            .section-title { font-size: 0.9rem; }
            .edition-name { font-size: 0.88rem; }
            .md-list-item { padding: 8px 10px; border-radius: 10px; }
            .md-icon-btn { width: 34px; height: 34px; }
            .md-icon-btn .material-icons-round { font-size: 18px; }
            
            .modal-content { padding: 18px 14px; border-radius: 18px; }
            .carousel-img { max-height: 45vh; }
            .book-notes { font-size: 0.85rem; padding: 12px; }
        }

        /* ===== CORRECTIONS MODAL ===== */
        .modal-corrections-list { list-style: none; padding: 0; margin: 0; }
        .corr-item-clickable {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid var(--md-outline-variant);
            margin-bottom: 8px;
            background: var(--md-surface-variant);
            transition: background 0.2s, transform 0.15s;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .corr-item-clickable:hover { background: var(--md-primary-container); transform: translateX(-3px); }
        .corr-item-clickable .material-icons-round { color: var(--md-primary); flex-shrink: 0; }
        .corr-detail-body { font-size: 0.95rem; line-height: 1.6; color: var(--md-on-surface-variant); margin-bottom: 16px; }
        .corr-detail-body ul { list-style: disc; padding-right: 20px; margin: 8px 0; }
        .corr-detail-body ol { list-style: decimal; padding-right: 20px; margin: 8px 0; }
        .corr-detail-body a { color: var(--md-primary); text-decoration: underline; }
        .corr-attachments-title {
            font-size: 0.85rem; font-weight: 700; color: var(--md-on-surface-variant);
            display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
        }
        .corr-attachments-list { display: flex; flex-direction: column; gap: 8px; }
        .attach-thumb {
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--md-outline-variant); display: block;
        }
        .attach-thumb img { width: 100%; max-height: 200px; object-fit: cover; display: block; }
        .attach-thumb span { font-size: 0.88rem; padding: 6px 10px; display: block; text-align: center; background: var(--md-surface-variant); }
        .pdf-link {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            border-radius: 10px; border: 1px solid var(--md-outline-variant);
            background: var(--md-surface-variant); color: var(--md-on-surface);
            text-decoration: none; font-size: 0.9rem; font-weight: 600;
            transition: background 0.2s;
            font-family: inherit; cursor: pointer; width: 100%; box-sizing: border-box;
            justify-content: flex-start; text-align: right;
        }
        .pdf-link:hover { background: var(--md-primary-container); }
        .pdf-link span { background: transparent !important; padding: 0 !important; font-weight: inherit; font-size: inherit; text-align: inherit; display: inline-block !important; }
        .pdf-link .material-icons-round { color: #c62828; font-size: 22px; }

        /* ===== PDF VIEWER MODAL ===== */
        .pdf-viewer-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        .pdf-viewer-content {
            background: var(--md-surface);
            width: 90%;
            height: 90%;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--md-elevation-3);
        }
        .pdf-viewer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            border-bottom: 1px solid var(--md-outline-variant);
        }
        .pdf-viewer-title {
            margin: 0;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }
        .pdf-btn-close, .pdf-btn-download {
            background: var(--md-surface);
            color: var(--md-primary);
            border: 1px solid var(--md-outline-variant);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .pdf-btn-close:hover, .pdf-btn-download:hover {
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
        }
        .pdf-viewer-body {
            flex-grow: 1;
            background: #525659;
            position: relative;
        }
        .pdf-viewer-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .corr-back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 20px; border: none;
            background: var(--md-surface-variant); color: var(--md-on-surface);
            font-family: inherit; font-size: 0.9rem; cursor: pointer;
            margin-bottom: 14px; transition: background 0.2s;
        }
        .corr-back-btn:hover { background: var(--md-outline-variant); }
        .corr-detail-title {
            font-size: 1rem; font-weight: 800; color: var(--md-on-surface);
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 2px solid var(--md-primary-container);
        }
        .md-icon-btn.warn-btn { color: #e65100; }
        .md-icon-btn.warn-btn:hover { background: rgba(230,81,0,0.1); }



        /* ===== PWA INSTALL BANNER ===== */
        #pwa-banner {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 5000;
            padding: 12px 16px;
            background: #1a2a27;
            color: #fff;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
            animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
            safe-area-inset-bottom: env(safe-area-inset-bottom);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        #pwa-banner.visible { display: block; }
        
        /* Permanent Header Install Button */
        .header-install-btn {
            display: none;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            align-items: center;
            gap: 6px;
            margin: 8px auto 0 auto;
            width: fit-content;
            transition: background 0.2s;
        }
        .header-install-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .header-install-btn span {
            font-size: 16px;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .pwa-banner-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .pwa-banner-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            flex-shrink: 0;
            object-fit: cover;
        }
        .pwa-banner-text {
            flex: 1;
        }
        .pwa-banner-text strong {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }
        .pwa-banner-text span {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.4;
        }
        .pwa-banner-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        #pwa-install-btn {
            background: var(--md-primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 8px 18px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        #pwa-install-btn:hover { background: #00897b; }
        #pwa-dismiss-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-family: 'Material Icons Round';
        }
        /* iOS specific instructions */
        .pwa-ios-steps {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
        }
        .pwa-ios-step {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.85);
        }
        .pwa-ios-step .step-icon {
            font-size: 16px;
            font-family: 'Material Icons Round';
            color: var(--md-primary-container);
        }
    </style>
</head>
<body>



    <!-- PWA Install Banner -->
    <div id="pwa-banner" role="complementary" aria-label="تثبيت التطبيق">
        <div class="pwa-banner-inner">
            <img src="icons/apple-touch-icon.png" class="pwa-banner-icon" alt="أيقونة التطبيق">
            <div class="pwa-banner-text" id="pwa-banner-text">
                <strong>تثبيت تطبيق «أفضل طبعة»</strong>
                <span>أضف التطبيق إلى شاشتك الرئيسية للوصول السريع</span>
            </div>
            <div class="pwa-banner-actions">
                <button id="pwa-install-btn">تثبيت</button>
                <button id="pwa-dismiss-btn" aria-label="إغلاق" class="material-icons-round">close</button>
            </div>
        </div>
    </div>

    <header>
        <h1>دليل أفضل طبعات الكتب الإسلامية</h1>
        <p>ابحث عن الكتاب، المؤلف، أو العلم لتعرف أفضل الطبعات المعتمدة</p>
        <button id="header-install-btn" class="header-install-btn">
            <span class="material-icons-round">download</span>
            تثبيت التطبيق
        </button>
    </header>

    <div class="filter-sticky-wrapper">
        <div class="filter-bar">
            <div class="search-wrapper">
                <span class="material-icons-round search-icon">search</span>
                <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن كتاب أو مؤلف..." autocomplete="off">
                <button id="clearSearchBtn" class="clear-search-btn material-icons-round" style="display: none;" aria-label="مسح البحث">close</button>
            </div>
            
            <div class="chips-row">
                <div class="science-filter-wrapper" id="scienceFilterWrapper">
                    <button class="science-filter-btn" id="scienceFilterBtn" aria-label="ابحث في العلوم">
                        <span class="material-icons-round">search</span>
                    </button>
                    <input type="text" id="scienceSearchInput" class="science-filter-input" placeholder="ابحث في العلوم..." autocomplete="off">
                    <button id="clearScienceBtn" class="clear-science-btn material-icons-round" aria-label="مسح البحث">close</button>
                </div>

                <div class="category-chips" id="categoryChips"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="booksContainer"></div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()" aria-label="إغلاق">
                <span class="material-icons-round">close</span>
            </button>
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ===== PDF VIEWER MODAL ===== -->
    <div id="pdfViewerModal" class="pdf-viewer-modal">
        <div class="pdf-viewer-content">
            <div class="pdf-viewer-header">
                <button class="pdf-btn-close" onclick="closePdfViewer()">
                    <span class="material-icons-round">close</span> إغلاق
                </button>
                <h4 id="pdfViewerTitle" class="pdf-viewer-title"></h4>
                <button id="pdfBtnDownload" class="pdf-btn-download">
                    <span class="material-icons-round">download</span> حفظ
                </button>
            </div>
            <div class="pdf-viewer-body">
                <iframe id="pdfViewerIframe" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <script>
        let booksData = [];
        let currentCarouselImages = [];
        let currentSlideIndex = 0;
        
        let currentSearchTerm = '';
        let currentCategory = 'الكل';

        function normalizeArabic(str) {
            if (!str) return '';
            return String(str)
                .toLowerCase()
                .replace(/[أإآ]/g, 'ا')
                .replace(/ة/g, 'ه')
                .replace(/[\u064B-\u0652]/g, '') // remove Arabic diacritics (harakat)
                .trim();
        }

        function loadBooks() {
            return fetch('books.json?_t=' + Date.now(), { cache: 'no-store' })
                .then(r => {
                    if (!r.ok) throw new Error('Network error');

                    const lastMod = r.headers.get('Last-Modified');
                    if (lastMod) {
                        const d = new Date(lastMod);
                        const greg = new Intl.DateTimeFormat('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
                        const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
                        const dateEl = document.getElementById('lastUpdateDate');
                        if (dateEl) dateEl.innerHTML = `<span class="material-icons-round" style="font-size:16px">update</span> آخر تحديث: ${hijri} / ${greg}`;
                    }

                    return r.json();
                })
                .then(data => {
                    booksData = data.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ar'));
                    initCategories();
                    filterAndDisplayBooks();
                })
                .catch(err => {
                    console.warn('Failed to fetch books.json, trying cache fallback...', err);
                });
        }

        loadBooks();


        function getBookCategories(book) {
            if (Array.isArray(book.category)) return book.category;
            if (book.category) return [book.category];
            return [];
        }

        function initCategories() {
            const container = document.getElementById('categoryChips');
            container.innerHTML = '';
            
            let allCategories = [];
            booksData.forEach(b => allCategories.push(...getBookCategories(b)));
            const uniqueCategories = [...new Set(allCategories.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ar'));
            
            container.appendChild(createChip('الكل', 'الكل', true));
            uniqueCategories.forEach(cat => container.appendChild(createChip(cat, cat, false)));
        }

        function createChip(label, value, isActive) {
            const btn = document.createElement('button');
            btn.className = `chip ${isActive ? 'active' : ''}`;
            btn.innerText = label;
            btn.dataset.value = value;
            btn.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = value;
                filterAndDisplayBooks();
            };
            return btn;
        }

        const sfWrapper = document.getElementById('scienceFilterWrapper');
        const sfBtn = document.getElementById('scienceFilterBtn');
        const sfInput = document.getElementById('scienceSearchInput');
        const clearScienceBtn = document.getElementById('clearScienceBtn');
 
        sfBtn.onclick = () => {
            sfWrapper.classList.toggle('expanded');
            if (sfWrapper.classList.contains('expanded')) {
                sfInput.focus();
            } else {
                sfInput.value = '';
                clearScienceBtn.style.display = 'none';
                filterChips(''); // إعادة إظهار التصنيفات عند إغلاق العدسة
            }
        };
 
        sfInput.onkeydown = (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sfInput.blur(); sfWrapper.classList.remove('expanded'); }
        };
 
        sfInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            clearScienceBtn.style.display = term ? 'flex' : 'none';
            filterChips(term);
        };

        clearScienceBtn.onclick = () => {
            sfInput.value = '';
            clearScienceBtn.style.display = 'none';
            sfInput.focus();
            filterChips('');
        };

        function filterChips(term) {
            const normalizedTerm = normalizeArabic(term);
            document.querySelectorAll('.chip').forEach(chip => {
                const normalizedValue = normalizeArabic(chip.dataset.value);
                if (chip.dataset.value === 'الكل' || normalizedValue.includes(normalizedTerm)) {
                    chip.style.display = 'inline-flex';
                } else {
                    chip.style.display = 'none';
                    if (chip.classList.contains('active')) {
                        // إذا اختفى التصنيف المحدد، نعود لـ "الكل"
                        document.querySelector('.chip[data-value="الكل"]').click();
                    }
                }
            });
        }

        const mainSearch = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        
        mainSearch.oninput = (e) => { 
            currentSearchTerm = e.target.value; 
            clearSearchBtn.style.display = currentSearchTerm ? 'flex' : 'none';
            filterAndDisplayBooks(); 
        };
        mainSearch.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); mainSearch.blur(); } };
        
        clearSearchBtn.onclick = () => {
            mainSearch.value = '';
            currentSearchTerm = '';
            clearSearchBtn.style.display = 'none';
            mainSearch.focus();
            filterAndDisplayBooks();
        };

        function filterAndDisplayBooks() {
            const normalizedSearchTerm = normalizeArabic(currentSearchTerm);
            const filtered = booksData.filter(book => {
                const normalizedTitle = normalizeArabic(book.title);
                const normalizedAuthor = normalizeArabic(book.author);
                const matchesSearch = normalizedTitle.includes(normalizedSearchTerm) ||
                                      normalizedAuthor.includes(normalizedSearchTerm);
                
                const cats = getBookCategories(book);
                const matchesCategory = currentCategory === 'الكل' || cats.includes(currentCategory);
                
                return matchesSearch && matchesCategory;
            });
            displayBooks(filtered);
        }

        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            container.innerHTML = '';

            if (books.length === 0) {
                container.innerHTML = `<div class="empty-state"><span class="material-icons-round">search_off</span><h3>لا توجد نتائج مطابقة لبحثك في هذا القسم.</h3></div>`;
                return;
            }

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'md-card';

                const bookCats = getBookCategories(book);
                const catsHTML = bookCats.map(cat => `
                    <span class="meta-chip">
                        <span class="material-icons-round">category</span>
                        <span class="text">${cat}</span>
                    </span>
                `).join('');

                const renderList = (editions, isEdition, type) => (editions || []).map((ed, idx) => {
                    let actions = '';
                    // Build display label: publisher - ت verifier
                    const edLabel = (() => {
                        const n = (ed.publisher || '').trim();
                        const v = (ed.verifier || '').trim();
                        if (n && v) return `${n} - ت ${v}`;
                        if (v) return `ت ${v}`;
                        return n;
                    })();
                    if (isEdition && ed.corrections && ed.corrections.length) actions += `<button class="md-icon-btn" onclick="openCorrectionsModal(${book.id}, '${type}', ${idx})" title="تصويبات الطبعة"><span class="material-icons-round">report_problem</span></button>`;
                    if (isEdition && ed.notes) actions += `<button class="md-icon-btn" onclick="openNoteModal('${encodeURIComponent(edLabel)}', '${encodeURIComponent(ed.notes)}')" title="ملاحظات حول الطبعة"><span class="material-icons-round">info</span></button>`;
                    if (isEdition && ((ed.images && ed.images.length) || ed.image)) actions += `<button class="md-icon-btn" onclick="openImageModal(${book.id}, '${type}', ${idx})" title="عرض صور الطبعة"><span class="material-icons-round">photo_library</span></button>`;
                    
                    return isEdition 
                        ? `<li class="md-list-item"><span class="edition-name">${edLabel}</span><div class="edition-actions">${actions}</div></li>`
                        : `<li class="md-list-item"><a href="${ed.url}" target="_blank" class="link-item"><span class="material-icons-round">open_in_new</span><span class="edition-name">${ed.title}</span></a></li>`;
                }).join('');

                let dateHTML = '';
                if (book.date) {
                    try {
                        const d = new Date(book.date);
                        if (!isNaN(d.getTime())) {
                            const greg = new Intl.DateTimeFormat('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
                            const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
                            dateHTML = `<div class="book-date">${hijri} / ${greg}</div>`;
                        }
                    } catch (e) {
                        console.error('Error formatting book date:', e);
                    }
                }

                card.innerHTML = `
                    <h2 class="book-title">${book.title}</h2>
                    <div class="book-meta">
                        <span class="meta-chip"><span class="material-icons-round">person</span><span class="text">${book.author}</span></span>
                        ${catsHTML}
                    </div>
                    ${book.best_editions?.length ? `<div class="section-title"><span class="material-icons-round">verified</span> أفضل الطبعات:</div><ul>${renderList(book.best_editions, true, 'best_editions')}</ul>` : ''}
                    ${book.alt_editions?.length ? `<div class="section-title"><span class="material-icons-round">rule</span> طبعات بديلة جيدة:</div><ul>${renderList(book.alt_editions, true, 'alt_editions')}</ul>` : ''}
                    ${book.links?.length ? `<div class="section-title"><span class="material-icons-round">link</span> روابط مفيدة:</div><ul>${renderList(book.links, false)}</ul>` : ''}
                    ${book.notes ? `<div class="book-notes"><span class="material-icons-round">lightbulb</span><div>${book.notes}</div></div>` : ''}
                    ${dateHTML}
                `;
                container.appendChild(card);
            });
        }

        function openNoteModal(title, content) {
            document.getElementById('modalTitle').innerText = decodeURIComponent(title);
            document.getElementById('modalBody').innerHTML = decodeURIComponent(content);
            document.getElementById('infoModal').style.display = 'flex';
        }

        function openImageModal(bookId, edType, index) {
            const ed = booksData.find(b => b.id === bookId)[edType][index];
            const n = (ed.publisher || '').trim();
            const v = (ed.verifier || '').trim();
            const edLabel = (n && v) ? `${n} - ت ${v}` : (v ? `ت ${v}` : n);
            document.getElementById('modalTitle').innerText = edLabel;
            currentCarouselImages = ed.images?.length ? ed.images : (ed.image ? [ed.image] : []);
            currentSlideIndex = 0;
            renderCarousel();
            document.getElementById('infoModal').style.display = 'flex';
        }

        function renderCarousel() {
            const body = document.getElementById('modalBody');
            if (currentCarouselImages.length <= 1) {
                body.innerHTML = `<div class="carousel-container"><img src="${currentCarouselImages[0]}" class="carousel-img"></div>`;
            } else {
                body.innerHTML = `
                    <div class="carousel-container">
                        <button class="carousel-btn right" dir="ltr" onclick="changeSlide(-1)"><span class="material-icons-round">chevron_right</span></button>
                        <img src="${currentCarouselImages[currentSlideIndex]}" class="carousel-img">
                        <button class="carousel-btn left" dir="ltr" onclick="changeSlide(1)"><span class="material-icons-round">chevron_left</span></button>
                    </div>
                    <div class="carousel-dots">صورة ${currentSlideIndex + 1} من ${currentCarouselImages.length}</div>`;
            }
        }
        
        function changeSlide(dir) { currentSlideIndex = (currentSlideIndex + dir + currentCarouselImages.length) % currentCarouselImages.length; renderCarousel(); }

        function openCorrectionsModal(bookId, edType, edIdx) {
            const ed = booksData.find(b => b.id === bookId)[edType][edIdx];
            document.getElementById('modalTitle').innerText = 'صحح نسختك';
            const list = (ed.corrections || []).map((corr, ci) => `
                <div class="corr-item-clickable" onclick="showCorrectionDetail(${bookId}, '${edType}', ${edIdx}, ${ci})">
                    <span class="material-icons-round">chevron_left</span>
                    <span>${corr.title || 'تصويب ' + (ci + 1)}</span>
                </div>
            `).join('');
            document.getElementById('modalBody').innerHTML = `
                <p style="font-size:0.85rem;color:var(--md-outline);margin-bottom:12px;">اضغط على تصويب لعرض تفاصيله:</p>
                <div class="modal-corrections-list">${list}</div>
            `;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function showCorrectionDetail(bookId, edType, edIdx, corrIdx) {
            const ed = booksData.find(b => b.id === bookId)[edType][edIdx];
            const corr = ed.corrections[corrIdx];
            const attachmentsHTML = (corr.attachments || []).map(att => {
                const isPdf = att.url && att.url.toLowerCase().endsWith('.pdf');
                if (isPdf) {
                    const cleanTitle = (att.title || 'ملف PDF').replace(/'/g, "\\'");
                    return `<button onclick="openPdfViewer('${att.url}', '${cleanTitle}')" class="pdf-link">
                        <span class="material-icons-round">picture_as_pdf</span>
                        <span>${att.title || 'ملف PDF'}</span>
                    </button>`;
                } else {
                    return `<div class="attach-thumb">
                        <img src="${att.url}" alt="${att.title || 'مرفق'}" loading="lazy" onerror="this.parentElement.style.display='none'">
                        <span>${att.title || 'مرفق'}</span>
                    </div>`;
                }
            }).join('');
            document.getElementById('modalBody').innerHTML = `
                <button class="corr-back-btn" onclick="openCorrectionsModal(${bookId}, '${edType}', ${edIdx})">
                    <span class="material-icons-round" style="font-size:18px">arrow_forward</span> رجوع للقائمة
                </button>
                <div class="corr-detail-title">${corr.title || ''}</div>
                ${corr.body ? `<div class="corr-detail-body">${corr.body}</div>` : ''}
                ${attachmentsHTML ? `
                    <div class="corr-attachments-title">
                        <span class="material-icons-round" style="font-size:16px">attachment</span> الملحقات:
                    </div>
                    <div class="corr-attachments-list">${attachmentsHTML}</div>
                ` : ''}
            `;
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        
        function openPdfViewer(url, title) {
            document.getElementById('pdfViewerTitle').innerText = title;
            document.getElementById('pdfViewerIframe').src = url;
            
            const downloadBtn = document.getElementById('pdfBtnDownload');
            downloadBtn.onclick = () => downloadPdf(url, title + '.pdf');
            
            document.getElementById('pdfViewerModal').style.display = 'flex';
        }

        function closePdfViewer() {
            document.getElementById('pdfViewerModal').style.display = 'none';
            document.getElementById('pdfViewerIframe').src = '';
        }

        function downloadPdf(url, filename) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.blob();
                })
                .then(blob => {
                    const blobUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename || url.split('/').pop() || 'document.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                })
                .catch(err => {
                    console.error('Failed to download PDF via blob, falling back to direct link', err);
                    window.open(url, '_blank');
                });
        }

        window.onclick = e => { 
            if (e.target.id === 'infoModal') closeModal(); 
            if (e.target.id === 'pdfViewerModal') closePdfViewer();
        };

        // Intercept clicks on links in standalone/app mode to force system browser
        document.addEventListener('click', function(e) {
            const a = e.target.closest('a');
            if (a && a.href && a.target === '_blank') {
                const isInStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone === true;
                if (isInStandalone) {
                    e.preventDefault();
                    window.open(a.href, '_blank');
                }
            }
        });
    </script>

    <!-- ===== PWA + PULL-TO-REFRESH SCRIPT ===== -->
    <script>
    (function() {
        'use strict';

        /* ── 1. SERVICE WORKER REGISTRATION ── */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => {
                        // Vérifier les mises à jour
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Nouveau contenu disponible, forcer l'activation
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                }
                            });
                        });
                    })
                    .catch(err => console.warn('[PWA] SW non enregistré:', err));
            });
        }

        /* ── 2. DÉTECTION OS ── */
        const ua = navigator.userAgent || '';
        const isIOS = /iP(hone|od|ad)/.test(ua);
        const isAndroid = /Android/.test(ua);
        const isInStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;

        /* ── 3. INSTALL BANNER ── */
        const banner   = document.getElementById('pwa-banner');
        const installBtn = document.getElementById('pwa-install-btn');
        const headerInstallBtn = document.getElementById('header-install-btn');
        const dismissBtn = document.getElementById('pwa-dismiss-btn');
        const bannerText = document.getElementById('pwa-banner-text');
        let deferredPrompt = null;
        const DISMISS_KEY = 'pwa_dismissed_tabaat';

        function showBanner() {
            if (localStorage.getItem(DISMISS_KEY)) return;
            banner.classList.add('visible');
        }

        function hideBanner() {
            banner.classList.remove('visible');
        }

        dismissBtn.addEventListener('click', () => {
            hideBanner();
            localStorage.setItem(DISMISS_KEY, '1');
        });

        // Trigger PWA installation prompt
        async function triggerInstallPrompt() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            hideBanner();
            headerInstallBtn.style.display = 'none';
            if (outcome === 'accepted') {
                localStorage.setItem(DISMISS_KEY, '1');
            }
        }

        if (!isInStandalone) {
            if (isIOS) {
                // iOS : instructions manuelles Partager → Ajouter
                bannerText.innerHTML = `
                    <strong>أضف «أفضل طبعة» لشاشتك الرئيسية</strong>
                    <div class="pwa-ios-steps">
                        <div class="pwa-ios-step">
                            <span class="step-icon material-icons-round">ios_share</span>
                            <span>اضغط على زر المشاركة ثم</span>
                        </div>
                        <div class="pwa-ios-step">
                            <span class="step-icon material-icons-round">add_box</span>
                            <span>اختر «إضافة إلى الشاشة الرئيسية»</span>
                        </div>
                    </div>`;
                installBtn.style.display = 'none';
                // Show header install button (but since iOS has no programmatic trigger, we show instructions on click)
                headerInstallBtn.style.display = 'flex';
                headerInstallBtn.addEventListener('click', () => {
                    banner.classList.add('visible');
                });
                // Afficher après 2 secondes
                setTimeout(showBanner, 2000);

            } else if (isAndroid || (!isIOS && !isAndroid)) {
                // Android/Chrome/Desktop : beforeinstallprompt
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    headerInstallBtn.style.display = 'flex';
                    setTimeout(showBanner, 1500);
                });

                installBtn.addEventListener('click', triggerInstallPrompt);
                headerInstallBtn.addEventListener('click', triggerInstallPrompt);

                window.addEventListener('appinstalled', () => {
                    hideBanner();
                    headerInstallBtn.style.display = 'none';
                    deferredPrompt = null;
                });
            }
        }



    })();
    </script>
</body>
</html>
