<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة - إدارة الكتب (GitHub Pages)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; padding: 20px; background: #f4f4f4; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 500px; font-family: monospace; font-size: 14px; direction: ltr; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .buttons-group { margin-top: 15px; display: flex; gap: 10px; }
        button { border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; font-family: inherit; transition: 0.3s;}
        .btn-download { background: #27ae60; color: white; }
        .btn-download:hover { background: #219150; }
        .btn-copy { background: #2980b9; color: white; }
        .btn-copy:hover { background: #2471a3; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>أداة تعديل قاعدة البيانات (JSON)</h2>
        <p>قم بتعديل البيانات هنا. عند الانتهاء، يمكنك نسخ الكود أو تحميل الملف لرفعه إلى GitHub.</p>
        
        <textarea id="jsonEditor"></textarea>
        
        <div class="buttons-group">
            <button class="btn-copy" onclick="copyJSON()">📋 نسخ الكود (Copier)</button>
            <button class="btn-download" onclick="downloadJSON()">💾 تحميل الملف (Télécharger)</button>
        </div>
        <div id="message"></div>
    </div>

    <script>
        // جلب البيانات الحالية من الموقع
        fetch('books.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('jsonEditor').value = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                showMessage("تعذر تحميل الملف الحالي. يمكنك البدء بملف فارغ.", "orange");
            });

        // دالة للتحقق من صحة JSON
        function validateJSON() {
            try {
                const data = document.getElementById('jsonEditor').value;
                JSON.parse(data); // اختبار هل الصيغة صحيحة
                return data;
            } catch (e) {
                showMessage("❌ خطأ في صيغة JSON! يرجى مراجعة الأقواس والفواصل.", "red");
                return null;
            }
        }

        // دالة النسخ
        function copyJSON() {
            const validData = validateJSON();
            if (validData) {
                navigator.clipboard.writeText(validData).then(() => {
                    showMessage("✅ تم نسخ الكود بنجاح! يمكنك الآن لصقه في GitHub.", "green");
                });
            }
        }

        // دالة التحميل
        function downloadJSON() {
            const validData = validateJSON();
            if (validData) {
                const blob = new Blob([validData], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "books.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showMessage("✅ تم تحميل الملف! قم برفعه إلى مستودع GitHub الخاص بك.", "green");
            }
        }

        function showMessage(msg, color) {
            const msgDiv = document.getElementById('message');
            msgDiv.style.color = color;
            msgDiv.innerText = msg;
            setTimeout(() => msgDiv.innerText = '', 5000);
        }
    </script>
</body>
</html>
