<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - إدارة الكتب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --bg: #f4f6f7; --border: #ddd; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: #333; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: white; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--primary); color: white; text-align: center; }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; }
        .sidebar-list li { padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; border-radius: 4px; }
        .sidebar-list li:hover, .sidebar-list li.active { background: #e8f4f8; font-weight: 600; color: var(--primary); }
        .btn-add-new { margin: 10px; padding: 10px; background: var(--secondary); color: white; border: none; cursor: pointer; font-family: inherit; font-weight: bold; border-radius: 5px; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .form-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; width: 100%; margin: 0 auto; display: none; }
        
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        h3 { color: #d35400; font-size: 1.1rem; margin-top: 20px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; box-sizing: border-box; }
        
        /* تصميم صفوف الطبعات */
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #eee; transition: background 0.3s; }
        .dynamic-row.sortable-ghost { opacity: 0.4; background: #e8f4f8; border: 1px dashed var(--primary); }
        .row-inputs { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .row-inputs-top { display: flex; gap: 8px; }
        .row-inputs input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; box-sizing: border-box;}
        
        .drag-handle { cursor: grab; color: #888; font-size: 1.5rem; padding: 0 10px; user-select: none; }
        .drag-handle:active { cursor: grabbing; }
        .btn-remove { background: var(--danger); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; height: fit-content;}
        .btn-add-row { background: #3498db; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-family: inherit; font-size: 0.9rem; margin-bottom: 10px; }

        .form-actions { margin-top: 30px; display: flex; gap: 10px; justify-content: flex-end; border-top: 2px solid var(--border); padding-top: 20px; }
        .btn-save { background: var(--secondary); color: white; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 5px; font-family: inherit; font-weight: bold; }
        
        .export-section { margin: 20px auto; max-width: 800px; width: 100%; display: flex; gap: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .export-section p { margin: 0 0 0 15px; align-self: center; font-weight: bold; color: var(--primary); }
        .btn-export { background: #2980b9; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-family: inherit; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 5px; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h3>قاعدة البيانات</h3></div>
        <button class="btn-add-new" onclick="createNewBook()">+ إضافة كتاب جديد</button>
        <ul class="sidebar-list" id="booksList"></ul>
    </div>

    <div class="main-content">
        <div class="export-section">
            <p>بعد الحفظ، قم بنسخ أو تحميل الملف لرفعه لـ GitHub:</p>
            <button class="btn-export" onclick="copyJSON()">📋 نسخ JSON</button>
            <button class="btn-export" style="background:#27ae60;" onclick="downloadJSON()">💾 تحميل books.json</button>
        </div>

        <div class="form-container" id="formContainer">
            <h2 id="formTitle">تعديل كتاب</h2>
            <form id="bookForm" onsubmit="saveBook(event)">
                <input type="hidden" id="bookId">
                
                <div class="form-group">
                    <label>عنوان الكتاب *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>المؤلف *</label>
                    <input type="text" id="author" required>
                </div>
                <div class="form-group">
                    <label>العلم / التصنيف *</label>
                    <input type="text" id="category" placeholder="مثال: الحديث، التفسير..." required>
                </div>
                <div class="form-group">
                    <label>ملاحظات الكتاب (اختياري)</label>
                    <textarea id="notes" rows="3" placeholder="ملاحظات عامة حول الكتاب..."></textarea>
                </div>

                <h3>أفضل الطبعات المعتمدة (اسحب ☰ لترتيبها)</h3>
                <div id="bestEditions"></div>
                <button type="button" class="btn-add-row" onclick="addEditionRow('bestEditions')">+ إضافة طبعة</button>

                <h3>طبعات بديلة (اسحب ☰ لترتيبها)</h3>
                <div id="altEditions"></div>
                <button type="button" class="btn-add-row" onclick="addEditionRow('altEditions')">+ إضافة طبعة بديلة</button>

                <h3>روابط مفيدة (اسحب ☰ لترتيبها)</h3>
                <div id="links"></div>
                <button type="button" class="btn-add-row" onclick="addLinkRow('links')">+ إضافة رابط</button>

                <div class="form-actions">
                    <button type="submit" class="btn-save">💾 حفظ التعديلات</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast">تم الحفظ بنجاح!</div>

    <script>
        let booksData = [];

        new Sortable(document.getElementById('bestEditions'), { handle: '.drag-handle', animation: 150 });
        new Sortable(document.getElementById('altEditions'), { handle: '.drag-handle', animation: 150 });
        new Sortable(document.getElementById('links'), { handle: '.drag-handle', animation: 150 });

        fetch('books.json')
            .then(res => res.json())
            .then(data => {
                booksData = data;
                renderSidebar();
            })
            .catch(err => console.log("ملف JSON غير متوفر بعد."));

        function renderSidebar() {
            const list = document.getElementById('booksList');
            list.innerHTML = '';
            booksData.forEach(book => {
                const li = document.createElement('li');
                li.innerText = book.title;
                li.onclick = () => loadBookIntoForm(book.id, li);
                list.appendChild(li);
            });
        }

        // إضافة حقل Notes للطبعة
        function addEditionRow(containerId, name = '', image = '', notes = '') {
            const container = document.getElementById(containerId);
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <span class="drag-handle" title="اسحب للترتيب">☰</span>
                <div class="row-inputs">
                    <div class="row-inputs-top">
                        <input type="text" class="ed-name" placeholder="اسم الطبعة *" value="${name}" required style="flex: 2;">
                        <input type="text" class="ed-image" placeholder="رابط الصورة (اختياري)" value="${image}" style="flex: 1;">
                    </div>
                    <input type="text" class="ed-notes" placeholder="ملاحظات خاصة بهذه الطبعة فقط (اختياري)" value="${notes}">
                </div>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        function addLinkRow(containerId, title = '', url = '') {
            const container = document.getElementById(containerId);
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <span class="drag-handle" title="اسحب للترتيب">☰</span>
                <div class="row-inputs row-inputs-top">
                    <input type="text" class="link-title" placeholder="عنوان الرابط" value="${title}" required>
                    <input type="text" class="link-url" placeholder="الرابط (URL)" value="${url}" required>
                </div>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        function createNewBook() {
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('formTitle').innerText = 'إضافة كتاب جديد';
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('notes').value = '';
            
            document.getElementById('bestEditions').innerHTML = '';
            document.getElementById('altEditions').innerHTML = '';
            document.getElementById('links').innerHTML = '';
            
            addEditionRow('bestEditions');
        }

        function loadBookIntoForm(id, liElement) {
            document.querySelectorAll('.sidebar-list li').forEach(li => li.classList.remove('active'));
            if(liElement) liElement.classList.add('active');

            const book = booksData.find(b => b.id === id);
            if (!book) return;

            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('formTitle').innerText = `تعديل: ${book.title}`;
            
            document.getElementById('bookId').value = book.id;
            document.getElementById('title').value = book.title;
            document.getElementById('author').value = book.author;
            document.getElementById('category').value = book.category;
            document.getElementById('notes').value = book.notes || '';

            const bestContainer = document.getElementById('bestEditions');
            bestContainer.innerHTML = '';
            if(book.best_editions) book.best_editions.forEach(ed => addEditionRow('bestEditions', ed.name, ed.image, ed.notes));

            const altContainer = document.getElementById('altEditions');
            altContainer.innerHTML = '';
            if(book.alt_editions) book.alt_editions.forEach(ed => addEditionRow('altEditions', ed.name, ed.image, ed.notes));

            const linksContainer = document.getElementById('links');
            linksContainer.innerHTML = '';
            if(book.links) book.links.forEach(link => addLinkRow('links', link.title, link.url));
        }

        function saveBook(e) {
            e.preventDefault();

            let id = document.getElementById('bookId').value;
            id = id ? parseInt(id) : (booksData.length > 0 ? Math.max(...booksData.map(b => b.id)) + 1 : 1);

            const newBook = {
                id: id,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                category: document.getElementById('category').value,
                notes: document.getElementById('notes').value,
                best_editions: [],
                alt_editions: [],
                links: []
            };

            document.querySelectorAll('#bestEditions .dynamic-row').forEach(row => {
                newBook.best_editions.push({ 
                    name: row.querySelector('.ed-name').value, 
                    image: row.querySelector('.ed-image').value,
                    notes: row.querySelector('.ed-notes').value
                });
            });

            document.querySelectorAll('#altEditions .dynamic-row').forEach(row => {
                newBook.alt_editions.push({ 
                    name: row.querySelector('.ed-name').value, 
                    image: row.querySelector('.ed-image').value,
                    notes: row.querySelector('.ed-notes').value
                });
            });

            document.querySelectorAll('#links .dynamic-row').forEach(row => {
                newBook.links.push({ title: row.querySelector('.link-title').value, url: row.querySelector('.link-url').value });
            });

            const existingIndex = booksData.findIndex(b => b.id === id);
            if (existingIndex >= 0) {
                booksData[existingIndex] = newBook;
            } else {
                booksData.push(newBook);
            }

            renderSidebar();
            document.getElementById('bookId').value = id;
            showToast("تم الحفظ! لا تنس استخراج JSON.");
        }

        function getJSONString() { return JSON.stringify(booksData, null, 2); }
        
        function copyJSON() {
            navigator.clipboard.writeText(getJSONString()).then(() => showToast("تم نسخ الكود!"));
        }

        function downloadJSON() {
            const blob = new Blob([getJSONString()], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "books.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("تم التحميل!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
